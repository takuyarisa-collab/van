      const BUILD_DIRECTION = {

      let activeBuildDirection = BUILD_DIRECTION.SNAP;
      const BUILD_DIRECTION_TUNING = {

          },

      };
      const ENEMY_BEHAVIOR_TYPES = {

      };
      const VISUAL_SCALE = {
        player: 1.3,

      };
      const XP_VISUAL = {

      };
      const XP_PICKUP_FEEDBACK = {

      };
      const SNAP_AUDIO = {

      const PLAYER_TRAIL_VISUAL = {
        minSpeed: 36,
        fullSpeed: 360,
        frequencySlow: 44,
        frequencyFast: 14,
        lifespanSlow: 120,
        lifespanFast: 210,
        scaleStartSlow: 0.34,
        scaleStartFast: 0.62,
        scaleEndSlow: 0.08,
        scaleEndFast: 0.03,

        alphaFast: 0.42,
      };
      const getActiveBuildTuning = () => BUILD_DIRECTION_TUNING[activeBuildDirection] || BUILD_DIRECTION_TUNING[BUILD_DIRECTION.SNAP];

      class BootScene extends Phaser.Scene {
        constructor() {
          super('boot');
        }

        create() {
          const cx = WORLD_W / 2;
          const cy = WORLD_H / 2;
          const convergeMs = 260;
          const settleHoldMs = 68;

          this._bootBackdrop = mountBootCollapsedBackdrop(this, {
            width: WORLD_W,
            height: WORLD_H,
            seed: 0x70f700,
            depthBase: -55,
            structureAlpha: 1.05,
            noiseAlpha: 1,
            fragmentAlpha: 1.02,
            noiseDots: 86,
          });

          const styleError = {
            fontFamily: 'system-ui, sans-serif',
            fontSize: '52px',
            fontStyle: 'bold',
            color: '#ff5a6a',
            stroke: '#3a1018',
            strokeThickness: 4,
          };
          const styleOverlap = {
            fontFamily: 'system-ui, sans-serif',
            fontSize: '52px',
            fontStyle: 'bold',
            color: '#58f0ff',
            stroke: '#0a2833',
            strokeThickness: 4,
          };

          this._bootTitle = createScatteredBootTitle(this, {
            width: WORLD_W,
            height: WORLD_H,
            cx,
            cy,
            lineGap: 27,
            seed: 0x70f701,
            styleError,
            styleOverlap,
          });

          this.events.once('shutdown', () => {
            this._bootBackdrop?.destroy?.();
            this._bootTitle?.destroy?.();
            this._bootBackdrop = null;
            this._bootTitle = null;
          });

          const goHome = () => {
            this._bootBackdrop?.destroy?.();
            this._bootTitle?.destroy?.();
            this._bootBackdrop = null;
            this._bootTitle = null;
            console.log('[BootScene] boot backdrop destroyed → starting home');
            this.scene.start('home');
          };

          this.input.once('pointerdown', () => {
            const frags = this._bootTitle.fragments;
            const glitchG = this._bootTitle.glitchGraphics;
            let done = 0;
            const need = 5 + frags.length;
            let settleScheduled = false;
            const tick = () => {
              done += 1;
              if (done < need || settleScheduled) return;
              settleScheduled = true;
              this.time.delayedCall(settleHoldMs, () => {
                const texts = frags.map((f) => f.text);
                this.tweens.add({
                  targets: texts,
                  scaleX: 1.05,
                  scaleY: 1.05,
                  duration: 75,
                  yoyo: true,
                  ease: 'Back.easeOut',
                  onComplete: () => this.time.delayedCall(42, goHome),
                });
              });
            };

            this._bootBackdrop.convergeLayers(convergeMs, 'Back.easeOut', [1.14], tick);

            if (glitchG) {
              this.tweens.add({
                targets: glitchG,
                alpha: 0,
                duration: convergeMs,
                ease: 'Back.easeOut',
                easeParams: [1.14],
                onComplete: tick,
              });
            }

            frags.forEach((f) => {
              this.tweens.add({
                targets: f.text,
                x: f.targetX,
                y: f.targetY,
                angle: 0,
                alpha: 1,
                duration: convergeMs,
                ease: 'Back.easeOut',
                easeParams: [1.14],
                onComplete: tick,
              });
            });
          });
        }
      }

      // ─────────────────────────────────────────────────────────────────────────
      // HOME UI — layout + delta system
      //
      // HOME_LAYOUT  : canonical positions/sizes for the normal state
      // createHomeDelta() : neutral delta object per element (offsetX/Y,
      //                     scaleX/Y, alpha, rotation)
      // _applyDelta()     : merges layout + delta → actual draw coords
      //
      // To collapse or rebuild the UI, change only the delta values and call
      // _redrawHomeUI().  The layout object never changes.
      // ─────────────────────────────────────────────────────────────────────────

      const HOME_LAYOUT = (() => {
        const centerX       = WORLD_W / 2;
        const startCenterY  = WORLD_H / 2;
        const startWidth    = Math.round(WORLD_W * 0.55);
        const startHeight   = 88;
        const subButtonWidth    = Math.round(startWidth * 0.82);
        const subButtonHeight   = Math.round(startHeight * 0.46);
        const subButtonSpacing  = 16;
        // top-left Y of the first sub-button row
        const subButtonsTopY    = startCenterY + startHeight / 2 + 48;
        const labels = ['ENHANCE', 'LOADOUT', 'LOG'];

        // ── outerFrame: 6-part decomposition of one outer border ────────────
        // padding from world edges
        const ofPad    = 28;
        const ofLeft   = ofPad;
        const ofRight  = WORLD_W - ofPad;
        const ofTop    = ofPad;
        const ofBottom = WORLD_H - ofPad;
        // vertical split at screen centre
        const ofMidY   = WORLD_H / 2;
        const outerFrame = Object.freeze({
          // horizontal bars (full width between left/right corners)
          top:          Object.freeze({ x1: ofLeft,  y1: ofTop,    x2: ofRight, y2: ofTop    }),
          bottom:       Object.freeze({ x1: ofLeft,  y1: ofBottom, x2: ofRight, y2: ofBottom }),
          // left vertical – upper half
          leftTop:      Object.freeze({ x1: ofLeft,  y1: ofTop,    x2: ofLeft,  y2: ofMidY   }),
          // left vertical – lower half
          leftBottom:   Object.freeze({ x1: ofLeft,  y1: ofMidY,   x2: ofLeft,  y2: ofBottom }),
          // right vertical – upper half
          rightTop:     Object.freeze({ x1: ofRight, y1: ofTop,    x2: ofRight, y2: ofMidY   }),
          // right vertical – lower half
          rightBottom:  Object.freeze({ x1: ofRight, y1: ofMidY,   x2: ofRight, y2: ofBottom }),
        });

        return Object.freeze({
          centerX,
          startCenterY,
          startWidth,
          startHeight,
          subButtonWidth,
          subButtonHeight,
          subButtonSpacing,
          subButtonsTopY,
          labels,
          outerFrame,
        });
      })();

      // Returns a neutral (no-op) delta object.
      // Collapse / rebuild: set fields on this object then call _redrawHomeUI().
      // fillAlpha is an optional extra field used only on the START fill layer;
      // when present it overrides the default base fill opacity.
      function createHomeDelta() {
        return { offsetX: 0, offsetY: 0, scaleX: 1, scaleY: 1, alpha: 1, rotation: 0 };
      }

      // Merge a layout rect with a delta → { x, y, w, h, alpha, rotation }
      function _applyDelta(baseX, baseY, baseW, baseH, delta) {
        return {
          x:        baseX + delta.offsetX,
          y:        baseY + delta.offsetY,
          w:        baseW * delta.scaleX,
          h:        baseH * delta.scaleY,
          alpha:    delta.alpha,
          rotation: delta.rotation,
        };
      }

      // Merge a layout line segment with a delta → { x1, y1, x2, y2, alpha }
      // offsetX/Y shift the whole segment; scaleX/Y extend from the midpoint.
      function _applySegmentDelta(seg, delta) {
        const mx = (seg.x1 + seg.x2) * 0.5 + delta.offsetX;
        const my = (seg.y1 + seg.y2) * 0.5 + delta.offsetY;
        const hx = (seg.x2 - seg.x1) * 0.5 * delta.scaleX;
        const hy = (seg.y2 - seg.y1) * 0.5 * delta.scaleY;
        return { x1: mx - hx, y1: my - hy, x2: mx + hx, y2: my + hy, alpha: delta.alpha };
      }

      class HomeScene extends Phaser.Scene {
        constructor() {
          super('home');
        }

        preload() {
          this.load.image('home-bg-normal', 'assets/home-bg-normal.png');
        }

        create() {
          // ── accent colors ────────────────────────────────────────────────────
          // START uses a salmon palette; sub-buttons keep the original cyan tones
          const FRAME_LW       = 2.3;
          const START_FILL_HEX = 0xf47b6a;   // salmon fill
          const START_LINE_HEX = 0xd45a47;   // slightly deeper frame line
          const START_TEXT_COL = '#f47b6a';
          const SUB_LW         = 1.4;
          const SUB_LINE       = 0x2ec8be;
          const SUB_TEXT       = '#2ec8be';

          // ── background ───────────────────────────────────────────────────────
          // グリッド (depthBase=-60) + 背景画像 (depthBase+1=-59) の2層構成。
          // グラデーション塗りつぶしは使用しない（正常状態）。
          this._homeBackdrop = mountHomeNormalBg(this, {
            width: WORLD_W,
            height: WORLD_H,
          });
          console.log('[HomeScene] backdrop created (mountHomeNormalBg: grid -60, image -59)');

          // ── 上側マスク（正常面 + 再構築途中面）────────────────────────────
          // depth -58: グリッド(-61)・背景画像(-59)より前面、UIより背面
          this._homeUpperMask = mountHomeUpperMask(this, {
            width: WORLD_W,
            depthBase: -58,
            row1Cells: 3,
            row2Cells: 2,
          });

          // ── deltas (one per independent element) ─────────────────────────────
          // All neutral now (normal state).  Mutate these + call _redrawHomeUI()
          // to drive collapse / rebuild animations without touching layout.
          //
          // START frame: startFrame = shared position/alpha for the whole button;
          //   startFrameTop/Bottom/Left/Right = per-side visibility overrides.
          //   Effective position of each side = startFrame.offset + side.offset.
          //
          // sub[i]: offsetX/offsetY/alpha = whole-button-level transform;
          //   frameTop/Bottom/Left/Right = per-side visibility overrides.
          this._delta = {
            startFrame:       createHomeDelta(),
            startFrameTop:    createHomeDelta(),
            startFrameBottom: createHomeDelta(),
            startFrameLeft:   createHomeDelta(),
            startFrameRight:  createHomeDelta(),
            startLabel: createHomeDelta(),
            sub: HOME_LAYOUT.labels.map(() => ({
              offsetX:    0,
              offsetY:    0,
              alpha:      1,
              frameTop:    createHomeDelta(),
              frameBottom: createHomeDelta(),
              frameLeft:   createHomeDelta(),
              frameRight:  createHomeDelta(),
              label: createHomeDelta(),
            })),
            outerFrame: {
              top:         createHomeDelta(),
              bottom:      createHomeDelta(),
              leftTop:     createHomeDelta(),
              leftBottom:  createHomeDelta(),
              rightTop:    createHomeDelta(),
              rightBottom: createHomeDelta(),
            },
          };

          // ── Phaser display objects (allocated once, redrawn by _redrawHomeUI) ─
          this._gStartFill = this.add.graphics().setDepth(3);
          this._gStartFrameTop    = this.add.graphics().setDepth(4);
          this._gStartFrameBottom = this.add.graphics().setDepth(4);
          this._gStartFrameLeft   = this.add.graphics().setDepth(4);
          this._gStartFrameRight  = this.add.graphics().setDepth(4);
          this._startText = this.add.text(0, 0, 'START', {
            fontFamily: 'system-ui, -apple-system, sans-serif',
            fontSize: '34px',
            fontStyle: 'bold',
            color: START_TEXT_COL,
            letterSpacing: 6,
          }).setOrigin(0.5).setDepth(5);

          // 4 independent side graphics per sub button (top, bottom, left, right)
          this._subFrameSides = HOME_LAYOUT.labels.map(() => ({
            top:    this.add.graphics().setDepth(4),
            bottom: this.add.graphics().setDepth(4),
            left:   this.add.graphics().setDepth(4),
            right:  this.add.graphics().setDepth(4),
          }));
          this._subTexts = HOME_LAYOUT.labels.map((label) =>
            this.add.text(0, 0, label, {
              fontFamily: 'monospace, system-ui, sans-serif',
              fontSize: '14px',
              color: SUB_TEXT,
              letterSpacing: 4,
            }).setOrigin(0.5).setDepth(5)
          );

          // ── outerFrame: 6 independent segment graphics ───────────────────────
          // depth 1 → above grid (-54), below everything else (3+)
          const _ofDepth = 1;
          this._outerFrameGfx = {
            top:         this.add.graphics().setDepth(_ofDepth),
            bottom:      this.add.graphics().setDepth(_ofDepth),
            leftTop:     this.add.graphics().setDepth(_ofDepth),
            leftBottom:  this.add.graphics().setDepth(_ofDepth),
            rightTop:    this.add.graphics().setDepth(_ofDepth),
            rightBottom: this.add.graphics().setDepth(_ofDepth),
          };

          // stash style constants for use in _redrawHomeUI
          this._style = { FRAME_LW, START_FILL_HEX, START_LINE_HEX, SUB_LW, SUB_LINE };
          // separate state for the START fill flash (not part of collapse delta)
          this._startFillAlpha = 0.12;

          // ── initial draw ─────────────────────────────────────────────────────
          // すべてのデルタは createHomeDelta() の中立値（正常状態）のまま使用する。
          // 崩壊・再構築表現は一切加えない。
          this._redrawHomeUI();

          // ── lifecycle ────────────────────────────────────────────────────────
          const cleanupHome = () => {
            this._homeBackdrop?.destroy?.();
            this._homeBackdrop = null;
            this._homeUpperMask?.destroy?.();
            this._homeUpperMask = null;
          };
          this.events.once('shutdown', cleanupHome);

          // ── STARTボタン専用クリック処理（全画面タップは廃止）────────────────
          let _startFired = false;
          this.input.on('pointerdown', (pointer) => {
            const L  = HOME_LAYOUT;
            const d  = this._delta.startFrame;
            const cx = L.centerX + d.offsetX;
            const cy = L.startCenterY + d.offsetY;
            const hw = (L.startWidth  * d.scaleX) / 2;
            const hh = (L.startHeight * d.scaleY) / 2;
            if (pointer.x >= cx - hw && pointer.x <= cx + hw &&
                pointer.y >= cy - hh && pointer.y <= cy + hh) {
              // フィードバック
              this._startFillAlpha = 0.24;
              this._redrawHomeUI();
              if (_startFired) return;
              _startFired = true;
              this.time.delayedCall(80, () => {
                this._startFillAlpha = 0.12;
                this._redrawHomeUI();
                cleanupHome();
                this.scene.start('game');
              });
            }
          });

          // ── 下ボタン個別クリック処理（ENHANCE / LOADOUT / LOG）─────────────
          const _subHandlers = [
            () => { console.log('[HOME] ENHANCE pressed'); },
            () => { console.log('[HOME] LOADOUT pressed'); },
            () => { console.log('[HOME] LOG pressed'); },
          ];

          this.input.on('pointerdown', (pointer) => {
            const L = HOME_LAYOUT;
            HOME_LAYOUT.labels.forEach((_, i) => {
              const sub    = this._delta.sub[i];
              const baseCY = L.subButtonsTopY + i * (L.subButtonHeight + L.subButtonSpacing)
                             + L.subButtonHeight / 2;
              const cx = L.centerX + sub.offsetX;
              const cy = baseCY   + sub.offsetY;
              const hw = L.subButtonWidth  / 2;
              const hh = L.subButtonHeight / 2;
              if (pointer.x >= cx - hw && pointer.x <= cx + hw &&
                  pointer.y >= cy - hh && pointer.y <= cy + hh) {
                _subHandlers[i]();
              }
            });
          });
        }

        // Redraws all home UI elements from HOME_LAYOUT + current deltas.
        // Call this whenever any delta value changes.
        _redrawHomeUI() {
          const L = HOME_LAYOUT;
          const { FRAME_LW, START_FILL_HEX, START_LINE_HEX, SUB_LW, SUB_LINE } = this._style;
          const START_CORNER_R = 8;

          // ── START frame (4 independent sides, shared startFrame base) ────────
          // startFrame provides the whole-button position/alpha offset.
          // Each side delta is composed on top: effective offset = sf + side.
          {
            const bx = L.centerX - L.startWidth  / 2;
            const by = L.startCenterY - L.startHeight / 2;
            const bw = L.startWidth;
            const bh = L.startHeight;
            const lw = FRAME_LW;
            const lc = START_LINE_HEX;
            const sf = this._delta.startFrame;

            // Compose startFrame base with a per-side delta
            const _compose = (side) => ({
              offsetX:  sf.offsetX  + side.offsetX,
              offsetY:  sf.offsetY  + side.offsetY,
              scaleX:   sf.scaleX   * side.scaleX,
              scaleY:   sf.scaleY   * side.scaleY,
              alpha:    sf.alpha    * side.alpha,
              rotation: sf.rotation + side.rotation,
            });

            // fill: uses startFrame position, alpha is the product of sf.alpha
            {
              const r = _applyDelta(bx, by, bw, bh, sf);
              this._gStartFill.clear();
              this._gStartFill.setAlpha(r.alpha);
              this._gStartFill.fillStyle(START_FILL_HEX, this._startFillAlpha);
              this._gStartFill.fillRoundedRect(r.x, r.y, r.w, r.h, START_CORNER_R);
            }

            // top side
            {
              const r = _applyDelta(bx, by, bw, bh, _compose(this._delta.startFrameTop));
              this._gStartFrameTop.clear();
              this._gStartFrameTop.setAlpha(r.alpha);
              this._gStartFrameTop.lineStyle(lw, lc, 1.0);
              this._gStartFrameTop.beginPath();
              this._gStartFrameTop.moveTo(r.x + START_CORNER_R, r.y);
              this._gStartFrameTop.lineTo(r.x + r.w - START_CORNER_R, r.y);
              this._gStartFrameTop.strokePath();
            }

            // bottom side
            {
              const r = _applyDelta(bx, by, bw, bh, _compose(this._delta.startFrameBottom));
              this._gStartFrameBottom.clear();
              this._gStartFrameBottom.setAlpha(r.alpha);
              this._gStartFrameBottom.lineStyle(lw, lc, 1.0);
              this._gStartFrameBottom.beginPath();
              this._gStartFrameBottom.moveTo(r.x + START_CORNER_R, r.y + r.h);
              this._gStartFrameBottom.lineTo(r.x + r.w - START_CORNER_R, r.y + r.h);
              this._gStartFrameBottom.strokePath();
            }

            // left side
            {
              const r = _applyDelta(bx, by, bw, bh, _compose(this._delta.startFrameLeft));
              this._gStartFrameLeft.clear();
              this._gStartFrameLeft.setAlpha(r.alpha);
              this._gStartFrameLeft.lineStyle(lw, lc, 1.0);
              this._gStartFrameLeft.beginPath();
              this._gStartFrameLeft.moveTo(r.x, r.y + START_CORNER_R);
              this._gStartFrameLeft.lineTo(r.x, r.y + r.h - START_CORNER_R);
              this._gStartFrameLeft.strokePath();
            }

            // right side
            {
              const r = _applyDelta(bx, by, bw, bh, _compose(this._delta.startFrameRight));
              this._gStartFrameRight.clear();
              this._gStartFrameRight.setAlpha(r.alpha);
              this._gStartFrameRight.lineStyle(lw, lc, 1.0);
              this._gStartFrameRight.beginPath();
              this._gStartFrameRight.moveTo(r.x + r.w, r.y + START_CORNER_R);
              this._gStartFrameRight.lineTo(r.x + r.w, r.y + r.h - START_CORNER_R);
              this._gStartFrameRight.strokePath();
            }
          }

          // ── START label ────────────────────────────────────────────────────
          {
            const sf = this._delta.startFrame;
            const d  = this._delta.startLabel;
            const x = L.centerX      + sf.offsetX + d.offsetX;
            const y = L.startCenterY + sf.offsetY + d.offsetY;
            this._startText.setPosition(x, y);
            this._startText.setAlpha(sf.alpha * d.alpha);
            this._startText.setAngle(sf.rotation + d.rotation);
            this._startText.setScale(sf.scaleX * d.scaleX, sf.scaleY * d.scaleY);
          }

          // ── sub-buttons (4 independent sides per button) ───────────────────
          // sub[i].offsetX/Y/alpha = whole-button transform.
          // sub[i].frameTop/Bottom/Left/Right = per-side visibility overrides.
          L.labels.forEach((_, i) => {
            const baseCY = L.subButtonsTopY + i * (L.subButtonHeight + L.subButtonSpacing)
                           + L.subButtonHeight / 2;
            const sub = this._delta.sub[i];
            const bx  = L.centerX - L.subButtonWidth / 2 + sub.offsetX;
            const by  = baseCY - L.subButtonHeight / 2   + sub.offsetY;
            const bw  = L.subButtonWidth;
            const bh  = L.subButtonHeight;
            const sides = this._subFrameSides[i];

            const _drawSubSide = (g, sideDelta, drawFn) => {
              const effAlpha = sub.alpha * sideDelta.alpha;
              const ex = bx + sideDelta.offsetX;
              const ey = by + sideDelta.offsetY;
              const ew = bw * sideDelta.scaleX;
              const eh = bh * sideDelta.scaleY;
              g.clear();
              g.setAlpha(effAlpha * 0.55);
              g.lineStyle(SUB_LW, SUB_LINE, 1.0);
              drawFn(g, ex, ey, ew, eh);
            };

            _drawSubSide(sides.top,    sub.frameTop,    (g, x, y, w) => {
              g.beginPath(); g.moveTo(x, y); g.lineTo(x + w, y); g.strokePath();
            });
            _drawSubSide(sides.bottom, sub.frameBottom, (g, x, y, w, h) => {
              g.beginPath(); g.moveTo(x, y + h); g.lineTo(x + w, y + h); g.strokePath();
            });
            _drawSubSide(sides.left,   sub.frameLeft,   (g, x, y, w, h) => {
              g.beginPath(); g.moveTo(x, y); g.lineTo(x, y + h); g.strokePath();
            });
            _drawSubSide(sides.right,  sub.frameRight,  (g, x, y, w, h) => {
              g.beginPath(); g.moveTo(x + w, y); g.lineTo(x + w, y + h); g.strokePath();
            });

            // label
            {
              const d = sub.label;
              const x = L.centerX + sub.offsetX + d.offsetX;
              const y = baseCY    + sub.offsetY + d.offsetY;
              this._subTexts[i].setPosition(x, y);
              this._subTexts[i].setAlpha(sub.alpha * d.alpha * 0.55);
              this._subTexts[i].setAngle(d.rotation);
              this._subTexts[i].setScale(d.scaleX, d.scaleY);
            }
          });

          // ── outerFrame (6 segments) ───────────────────────────────────────
          {
            const OF_LW    = 1.4;
            const OF_COLOR = 0x5c7cad;
            const OF_ALPHA = 0.50;
            const of       = L.outerFrame;
            const gfx      = this._outerFrameGfx;
            const dof      = this._delta.outerFrame;

            const _drawSeg = (g, seg, delta) => {
              const s = _applySegmentDelta(seg, delta);
              g.clear();
              g.setAlpha(s.alpha * OF_ALPHA);
              g.lineStyle(OF_LW, OF_COLOR, 1.0);
              g.lineBetween(s.x1, s.y1, s.x2, s.y2);
            };

            _drawSeg(gfx.top,         of.top,         dof.top);
            _drawSeg(gfx.bottom,      of.bottom,      dof.bottom);
            _drawSeg(gfx.leftTop,     of.leftTop,     dof.leftTop);
            _drawSeg(gfx.leftBottom,  of.leftBottom,  dof.leftBottom);
            _drawSeg(gfx.rightTop,    of.rightTop,    dof.rightTop);
            _drawSeg(gfx.rightBottom, of.rightBottom, dof.rightBottom);
          }
        }
      }

      class GameScene extends Phaser.Scene {
        constructor() {
          super('game');
        }

        preload() {

              feedbackCooldownMs: 70,

            },
            xpMagnetBurst: {
              activeUntil: Number.NEGATIVE_INFINITY,

              radiusMultiplier: 1.95,
              speedMultiplier: 7.5,
              lerpMultiplier: 1.8,
            },
            releaseStabilityPulse: {
              activeUntil: Number.NEGATIVE_INFINITY,
              durationMs: 280,
              instabilityMultiplier: 0.45,
            },
            nearMissMagnetPulse: {
              activeUntil: Number.NEGATIVE_INFINITY,
              durationMs: 160,
              radius: 178,
              maxSpeed: 360,
              lerp: 0.32,
            },
            nearMissBurst: {
              activeUntil: Number.NEGATIVE_INFINITY,
              durationMs: 150,
              speedMultiplier: 1.58,
            },
            nearMissPushback: {
              activeUntil: Number.NEGATIVE_INFINITY,

              speed: 132,

              activeUntil: Number.NEGATIVE_INFINITY,
              durationMs: 180,
              instabilityMultiplier: 0.86,
            },
            spawnDirector: {
              startedAt: 0,
              rampDurationMs: 4 * 60 * 1000,
              baseDelayMs: 900,
              minDelayMs: 340,
              baseEnemyCap: 18,
              maxEnemyCap: 52,

              biasUntil: 0,

            nextEnemyUid: 1,
          };

          this.player = this.physics.add.sprite(WORLD_W / 2, WORLD_H / 2, VISUAL_ASSETS.player.textureKey);
          this.player.setScale(VISUAL_SCALE.player);
          this.player.setCircle(VISUAL_ASSETS.player.hitRadius).setCollideWorldBounds(true);
          this.player.body.setDrag(0);
          this.playerHitRing = this.add.circle(
            this.player.x,
            this.player.y,
            VISUAL_ASSETS.player.hitRadius,
            0x89cdff,
            0.11,
          ).setStrokeStyle(1.5, 0xb7e3ff, 0.34).setDepth(this.player.depth + 1);
          this.playerBaseAlpha = this.player.alpha;
          this.playerBaseScale = this.player.scale;
          this.playerTrailParticles = this.add.particles(0, 0, VISUAL_ASSETS.player.textureKey, {
            lifespan: PLAYER_TRAIL_VISUAL.lifespanSlow,

            alpha: { start: PLAYER_TRAIL_VISUAL.alphaSlow, end: 0 },

            tint: [0x95ceff, 0xd5ebff],

          }).setDepth(this.player.depth - 1);
          this.xpTrailParticles = this.add.particles(0, 0, VISUAL_ASSETS.xp.textureKey, {
            lifespan: XP_VISUAL.trailLifespanMin,
