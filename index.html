  <!-- グローバルエラー捕捉: ?debug=1 のとき画面左上に赤文字で表示 -->
  <script>
    (function () {
      const _isDebug = /[?&]debug=1/.test(location.search);
      function _showError(msg) {
        if (!_isDebug) return;
        let el = document.getElementById('_global_err_overlay');
        if (!el) {
          el = document.createElement('pre');
          el.id = '_global_err_overlay';
          el.style.cssText = [
            'position:fixed', 'top:0', 'left:0', 'z-index:99999',
            'margin:0', 'padding:6px 8px', 'max-width:100vw',
            'background:rgba(0,0,0,0.75)', 'color:#ff4444',
            'font:11px/1.4 ui-monospace,monospace', 'white-space:pre-wrap',
            'pointer-events:none',
          ].join(';');
          document.body.appendChild(el);
        }
        el.textContent += msg + '\n';
      }
      window.onerror = function (msg, src, line, col, err) {
        _showError('[ERROR] ' + msg + '\n  at ' + src + ':' + line + ':' + col);
      };
      window.addEventListener('unhandledrejection', function (ev) {
        _showError('[UNHANDLED] ' + (ev.reason?.stack || ev.reason));
      });
    })();
  </script>

      const BOOT_LOG_MESSAGES_A = [

      /** 崩壊フェーズ専用: ERROR のみ（比率最大化） */

      /** Boot 開始直後に Phase A ログを 2〜4 行プリフィル（タイマーは create で 0） */
      function seedBootLogLines(scene) {
        const pool = scene._logPool;
        if (!pool?.length) return;
        const msgs = BOOT_LOG_MESSAGES_A;
        const n = 2 + Math.floor(Math.random() * 3);
        let msgIndex = scene._logMsgIndex | 0;
        let lastCat = scene._logLastCategory;
        let lastText = scene._logLastText;

        for (let i = 0; i < n && i < pool.length; i++) {
          const t = pool[i];
          let tries = 0;
          let entry = msgs[msgIndex % msgs.length];
          while (
            tries < msgs.length &&
            (entry.cat === lastCat || entry.text === lastText)
          ) {
            msgIndex++;
            entry = msgs[msgIndex % msgs.length];
            tries++;
          }
          lastCat = entry.cat;
          lastText = entry.text;
          msgIndex++;

          const isError = entry.cat === 0;
          const isWarn = entry.cat === 1;
          t.setStyle({ color: (isError || isWarn) ? '#ff6a6a' : '#5f7388' });
          t.setText(entry.text);
          t.setStyle({ letterSpacing: Phaser.Math.FloatBetween(-0.5, 0.5) });

          const totalActive = i + 1;
          for (let _li = 0; _li < totalActive; _li++) {
            const age = totalActive - _li;
            const baseA = age === 0 ? 1.0 : Math.max(0.6, 1.0 - age * 0.06);
            pool[_li].setAlpha(baseA);
          }
          t.setAlpha(1.0);
        }

        scene._logActiveCount = Math.min(n, pool.length);
        scene._logMsgIndex = msgIndex;
        scene._logLastCategory = lastCat;
        scene._logLastText = lastText;
        scene._logTimer = 0;
      }

      /** 崩壊フェーズ: 左上ログ＋浮遊ログの alpha 揺らぎ・欠落・終端フェード（追加入力後に毎フレーム呼ぶ） */
      function applyBootCollapseLogVisuals(scene) {
        const pool = scene._logPool;
        const n = scene._logActiveCount | 0;
        const ct = scene._collapseT;
        const dur = scene._collapseDur;
        const tailStart = dur - 280;
        const tailV =
          ct > tailStart
            ? Phaser.Math.Clamp((ct - tailStart) / Math.max(1, dur - tailStart), 0, 1)
            : 0;
        const tailMul = Phaser.Math.Linear(1, 0.08, tailV);
        const chaos = ct > 55 && ct < 360;
        const applyOne = (t, i, total) => {
          if (!t || t.destroyed) return;
          const age = total - i;
          let baseA = age === 0 ? 1 : Math.max(0.44, 1 - age * 0.036);
          if (chaos) {
            const wobble = Math.sin(ct * 0.051 + i * 1.61) * 0.21;
            baseA = Phaser.Math.Clamp(
              baseA * (0.56 + wobble + (Math.random() - 0.5) * 0.17),
              0.05,
              1,
            );
          }
          if (scene._collapseLogGhostIdx?.has(i)) {
            if (Math.sin(ct * 0.023 + i * 2.33) > 0.2) baseA *= 0.04;
          }
          baseA *= tailMul;
          t.setAlpha(Phaser.Math.Clamp(baseA, 0.04, 1));
        };
        if (pool && n > 0) {
          for (let i = 0; i < n; i++) {
            applyOne(pool[i], i, n);
          }
        }
        const floats = scene._bootFloatLogActive;
        if (floats?.length) {
          for (let fi = 0; fi < floats.length; fi++) {
            const row = floats[fi];
            if (!row?.txt || row.txt.destroyed) continue;
            const i = n + fi;
            applyOne(row.txt, i, n + floats.length);
          }
        }
      }

      function bootFloatLogActiveCount(scene) {
        return scene._bootFloatLogActive?.filter((r) => r.txt && !r.txt.destroyed).length ?? 0;
      }

      function bootPickFloatAnchor(scene, p, W, H, cx, cy) {
        const r = Math.random();
        if (p < 0.52 || r < 0.45) {
          return {
            x: 10 + Math.random() * (W * 0.38),
            y: 12 + Math.random() * (H * 0.28),
          };
        }
        if (p < 0.68 || r < 0.72) {
          return {
            x: W * 0.5 + (Math.random() - 0.5) * W * 0.34,
            y: H * (0.36 + Math.random() * 0.16),
          };
        }
        if (r < 0.55) {
          return {
            x: W * 0.08 + Math.random() * (W * 0.22),
            y: H * (0.72 + Math.random() * 0.22),
          };
        }
        if (r < 0.82) {
          return {
            x: W * 0.72 + Math.random() * (W * 0.22),
            y: H * (0.28 + Math.random() * 0.5),
          };
        }
        const img = scene._bootTitleImg;
        if (img && !img.destroyed) {
          return {
            x: img.x + (Math.random() - 0.5) * img.displayWidth * 0.85,
            y: img.y + (Math.random() - 0.5) * img.displayHeight * 0.75,
          };
        }
        return { x: cx + (Math.random() - 0.5) * 120, y: cy + (Math.random() - 0.5) * 80 };
      }

      function spawnBootFloatLogLine(scene, p, W, H, cx, cy) {
        const pool = scene._bootFloatLogPool;
        if (!pool?.length) return;
        const active = scene._bootFloatLogActive ?? (scene._bootFloatLogActive = []);
        let free = pool.find((t) => t && !t.destroyed && !t.getData('inUse'));
        if (!free) {
          const oldest = active.shift();
          if (oldest?.txt && !oldest.txt.destroyed) {
            oldest.txt.setData('inUse', false);
            oldest.txt.setAlpha(0);
            oldest.txt.setPosition(-800, -800);
          }
          free = pool.find((t) => t && !t.destroyed && !t.getData('inUse'));
        }
        if (!free) return;
        free.setData('inUse', true);
        const pos = bootPickFloatAnchor(scene, p, W, H, cx, cy);
        const snip = BOOT_FLOAT_LOG_SNIPS[Phaser.Math.Between(0, BOOT_FLOAT_LOG_SNIPS.length - 1)];
        const mega = p > 0.82 && Math.random() < 0.22;
        free.setPosition(pos.x, pos.y);
        free.setStyle({
          fontFamily: '"Courier New", Courier, monospace',
          fontSize: mega ? '17px' : '11px',
          color: mega ? '#ff3d3d' : '#8a9aaa',
        });
        free.setText(snip);
        free.setOrigin(0, 0);
        free.setAlpha(0.94);
        free.setDepth(11);
        const ttl = mega
          ? Phaser.Math.Between(420, 620)
          : Phaser.Math.Between(280, 520);
        active.push({ txt: free, until: scene.time.now + ttl });
      }

      function updateBootFloatLogs(scene, dt, p, W, H, cx, cy) {
        if (!scene._bootFloatLogPool) return;
        const active = scene._bootFloatLogActive ?? (scene._bootFloatLogActive = []);
        const now = scene.time.now;
        for (let i = active.length - 1; i >= 0; i--) {
          const row = active[i];
          if (!row.txt || row.txt.destroyed) {
            active.splice(i, 1);
            continue;
          }
          if (now >= row.until) {
            row.txt.setData('inUse', false);
            row.txt.setAlpha(0);
            row.txt.setPosition(-800, -800);
            active.splice(i, 1);
          }
        }
        if (scene._collapsePhase) return;
        let maxA = 2;
        if (p >= 0.5) maxA = 4;
        if (p >= 0.62) maxA = 5;
        if (p >= 0.75) maxA = 7;
        if (p >= 0.82) maxA = 8;
        if (bootFloatLogActiveCount(scene) >= maxA) return;
        scene._bootFloatSpawnAcc = (scene._bootFloatSpawnAcc || 0) + dt;
        const interval = p < 0.52 ? 480 : p < 0.72 ? 320 : p < 0.88 ? 200 : 140;
        if (scene._bootFloatSpawnAcc >= interval) {
          scene._bootFloatSpawnAcc = 0;
          spawnBootFloatLogLine(scene, p, W, H, cx, cy);
        }
      }

      function bootSpawnCollapseLogScatters(scene) {
        scene._bootLogScatterFrags = [];
        const pool = scene._logPool;
        const na = scene._logActiveCount | 0;
        if (!pool || na <= 0) return;
        let fragN = 0;
        const max = 16;
        for (let li = 0; li < na && fragN < max; li++) {
          const poolT = pool[li];
          const str = poolT.text || '';
          if (str.length < 3) continue;
          const picks = Phaser.Math.Between(1, 2);
          for (let j = 0; j < picks && fragN < max; j++) {
            const ci = Phaser.Math.Between(0, str.length - 1);
            const ch = str[ci];
            if (ch === ' ' || ch === '\t') continue;
            const charW = Math.max(6, (poolT.width || 60) / str.length);
            const sx = poolT.x + ci * charW * 0.72;
            const sy = poolT.y + poolT.height * 0.45;
            const col = poolT.style?.color ?? '#ff6a6a';
            const tt = scene.add
              .text(sx, sy, ch, {
                fontFamily: '"Courier New", Courier, monospace',
                fontSize: '12px',
                color: col,
              })
              .setOrigin(0.5, 0.5)
              .setDepth(13)
              .setAlpha(0.92);
            scene._bootLogScatterFrags.push({
              txt: tt,
              vx: Phaser.Math.FloatBetween(-118, 118),
              vy: Phaser.Math.FloatBetween(-95, 95),
              drag: 0.987,
              life: 1,
            });
            fragN++;
          }
        }
      }

      function updateBootLogScatters(scene, collapseNorm, dt) {
        const arr = scene._bootLogScatterFrags;
        if (!arr?.length) return;
        const spec = scene._faultBandSpec;
        let bandTop = -1e9;
        let bandBot = -1e8;
        if (spec) {
          bandTop = spec.mainCy - spec.mainH * 0.5;
          bandBot = bandTop + spec.mainH;
        }
        const subSwallow = (my) => {
          if (!spec?.sub) return false;
          const st = spec.sub.cy - spec.sub.h * 0.5;
          const sb = st + spec.sub.h;
          return my >= st && my <= sb;
        };
        const dtf = dt / 16.67;
        for (let i = arr.length - 1; i >= 0; i--) {
          const o = arr[i];
          if (!o.txt || o.txt.destroyed) {
            arr.splice(i, 1);
            continue;
          }
          o.vx *= o.drag;
          o.vy = o.vy * o.drag + 28 * (dt / 1000);
          o.txt.x += o.vx * 0.06 * dtf;
          o.txt.y += o.vy * 0.06 * dtf;
          let life = o.life;
          const my = o.txt.y;
          if (
            spec &&
            collapseNorm > 0.06 &&
            ((my >= bandTop && my <= bandBot) || subSwallow(my))
          ) {
            life -= 0.11 * (dt / 1000);
            o.vx *= 0.9;
            o.vy *= 0.88;
          }
          life -= 0.0019 * dt;
          o.life = life;
          o.txt.setAlpha(Phaser.Math.Clamp(life, 0, 1) * 0.92);
          o.txt.rotation += 0.0018 * dt * (Math.random() - 0.45);
          if (life < 0.04) {
            o.txt.destroy();
            arr.splice(i, 1);
          }
        }
      }

      function registerBootYLetterFragments(scene) {
        const items = [];
        const charset = 'ERR!><:';
        const hand = scene._bootTitleImg && !scene._bootTitleImg.destroyed
          ? scene._bootTitleImg
          : null;
        const cx = WORLD_W / 2;
        const cy = WORLD_H / 2;
        for (let i = 0; i < 6; i++) {
          let sx;
          let sy;
          if (i < 2 && scene._bootFloatLogActive?.length) {
            const fl = scene._bootFloatLogActive[i];
            if (fl?.txt && !fl.txt.destroyed) {
              sx = fl.txt.x + fl.txt.width * 0.5;
              sy = fl.txt.y + fl.txt.height * 0.5;
            }
          }
          if (sx == null && scene._logPool && (scene._logActiveCount | 0) > 0) {
            const t = scene._logPool[Phaser.Math.Between(0, (scene._logActiveCount | 0) - 1)];
            sx = t.x + Math.min(t.width * 0.4, 80);
            sy = t.y + 5;
          }
          if (sx == null) {
            sx = Phaser.Math.FloatBetween(16, 120);
            sy = Phaser.Math.FloatBetween(36, 220);
          }
          if (i >= 4 && hand) {
            sx = hand.x + Phaser.Math.FloatBetween(-130, 130);
            sy = hand.y + Phaser.Math.FloatBetween(-50, 90);
          }
          items.push({ x: sx, y: sy, ch: charset[i % charset.length] });
        }
        scene.game.registry.set(REG_BOOT_Y_LETTER_FRAGS, { items });
      }

      /** 警告2行＋フレームをタイトル下に配置（タイトル微振動時も追従） */
      function placeBootWarningBlock(scene, cx, cy) {
        if (!scene._warnText1 || !scene._warnText2 || !scene._warnFrame || !scene._bootTitleImg) return;
        const imgDH2 = scene._bootTitleImg.displayHeight;
        const warnY1 = scene._bootTitleImg.y + imgDH2 * BOOT_DEBUG.warnOffsetY;
        const lineGap = 8;
        scene._warnText1.setY(warnY1);
        scene._warnText2.setY(warnY1 + scene._warnText1.height + lineGap);

        const tw = Math.max(scene._warnText1.width, scene._warnText2.width);
        const fy1 = warnY1;
        const fy2 = scene._warnText2.y + scene._warnText2.height;
        const fx = cx - tw * 0.5;
        const padX = 12;
        const padY = 6;
        const rx = fx - padX;
        const ry = fy1 - padY;
        const rw = tw + padX * 2;
        const rh = fy2 - fy1 + padY * 2;
        const corner = 6;
        const gf = scene._warnFrame;
        const crit = Boolean(scene._warnFrameCritical);
        gf.clear();
        gf.fillStyle(crit ? 0x3a0508 : 0x6b2830, crit ? 0.22 : 0.10);
        gf.fillRect(rx, ry, rw, rh);
        gf.lineStyle(crit ? 2.4 : 1, crit ? 0xff2a3d : 0x8b3b42, crit ? 0.96 : 0.75);
        gf.lineBetween(rx + corner, ry, rx + rw - corner * 2.5, ry);
        gf.lineBetween(rx + rw, ry + corner * 2, rx + rw, ry + rh - corner);
        gf.lineBetween(rx + corner * 2.5, ry + rh, rx + rw - corner, ry + rh);
        gf.lineBetween(rx, ry + corner, rx, ry + rh - corner * 2);
        gf.lineStyle(crit ? 2.8 : 2, crit ? 0xff1a35 : 0x7a3038, crit ? 0.72 : 0.45);
        gf.lineBetween(rx + corner, ry, rx + rw * 0.4, ry);
        gf.lineBetween(rx, ry + corner, rx, ry + rh * 0.45);
        scene._warnLayout = { rx, ry, rw, rh, corner };
      }

      // ─────────────────────────────────────────────────────────────────────────
      // デバッグ HUD — ?debug=1 のときだけ表示する共通ヘルパー
      //
      // 使い方:
      //   this._debugHud = createDebugHUD(this, () => ({
      //     scene: 'boot', phase: ..., p: ..., ...
      //   }));
      //   // update() 内で毎フレーム呼ぶ:
      //   this._debugHud?.tick();
      //   // シーン破棄時:
      //   this._debugHud?.destroy();
      //
      // ?debug=1 が付いていないときは null を返すため、呼び出し側はオプショナル
      // チェーン (?.) で安全に扱える。
      // ─────────────────────────────────────────────────────────────────────────
      function createDebugHUD(scene, getState) {
        console.log('[HUD] create');
        if (!window.DEBUG_HUD_ENABLED) return null;

        const HUD_ALPHA  = 0.72;
        const HUD_DEPTH  = 9999;
        const HUD_PAD_X  = 8;
        const HUD_PAD_Y  = 8;

        const _text = scene.add.text(HUD_PAD_X, HUD_PAD_Y, '', {
          fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace',
          fontSize: '16px',
          color: '#c8ffd4',
          stroke: '#000000',
          strokeThickness: 2,
          lineSpacing: 6,
        })
          .setScrollFactor(0)
          .setDepth(HUD_DEPTH)
          .setAlpha(HUD_ALPHA)
          .setOrigin(0, 0);

        function tick() {
          const s = getState();
          const lines = [
            `scene:${s.scene ?? '-'}`,
            `phase:${s.phase ?? '-'}`,
            `p:${s.p != null ? s.p.toFixed(3) : '-'}`,
            `override:${s.progressOverride != null ? s.progressOverride.toFixed(3) : 'none'}`,
            `tween:${s.tweenState ?? 'none'}`,
            `titleMask:${s.titleMask ?? '-'}`,
            `overlay:${s.overlay ?? '-'}`,
            `--- raw values ---`,
            `bootDur:${s.bootDur ?? '-'}`,
            `done:${s.done ?? '-'}`,
            `rawProgress:${s.rawProgress != null ? s.rawProgress.toFixed(3) : '-'}`,
            `tweenPlaying:${s.tweenPlaying ?? '-'}`,
            `tweenPaused:${s.tweenPaused ?? '-'}`,
            `homePlayRefNatH:${s.playRefH ?? '-'}`,
            `homeYOffsetPx:${s.homeYOffsetPx != null ? String(s.homeYOffsetPx) : '-'}`,
            `homeYOffsetAppliedPx:${s.homeYOffsetAppliedPx != null ? String(s.homeYOffsetAppliedPx) : '-'}`,
            `homeAutoOffset:${s.homeAutoOffset != null ? String(s.homeAutoOffset) : '-'}`,
            `playDisplay:${s.playDisplay ?? '-'}`,
            `subDisplay:${s.subDisplay ?? '-'}`,
            `playSubGapPx:${s.playSubGapPx != null ? String(s.playSubGapPx) : '-'}`,
            `playOffsetXY:${s.playOffsetXY ?? '-'}`,
            `playPanelOffsetXY:${s.playPanelOffsetXY ?? '-'}`,
            `playTextOffsetXY:${s.playTextOffsetXY ?? '-'}`,
            `sub012PanelXY:${s.sub012PanelXY ?? '-'}`,
            `sub012TextXY:${s.sub012TextXY ?? '-'}`,
          ];
          _text.setText(lines);
        }

        function destroy() {
          _text.destroy();
        }

        function setVisible(visible) {
          _text.setVisible(Boolean(visible));
        }

        return { tick, destroy, setVisible };
      }

      const HomeScene = createHomeScene(WORLD_W, WORLD_H, createDebugHUD);

      /** Boot タイトル水平スキャン: LAP 帯（文字インデックス 4〜6 / 7）付近で progress を僅かに遅らせる */
      function bootTitleProgressHitch(p) {
        const ts = BOOT_DEBUG.titleStart;
        if (p < ts) return p;
        const titleP = ts < 1 ? (p - ts) / (1 - ts) : 1;
        const z0 = 4 / 7;
        const z1 = 6 / 7;
        if (titleP <= z0 || titleP >= z1) return p;
        const u = (titleP - z0) / (z1 - z0);
        const m = Math.sin(Math.PI * u);
        return p - 0.018 * m * (1 - ts);
      }

      // ─────────────────────────────────────────────────────────────────────────
      // BOOT フェーズ 1〜3
      //
      // フェーズ1: progress 0→1, Quart.easeOut, 1200ms
      // フェーズ2: 背景スキャン (上から下、オーバーレイ縮小)
      //            revealY / 背景 alpha 共通: bgStart→bgEnd で easeInCubic（序盤遅く後半速く）
      // フェーズ3: タイトル描画
      //            Overlap: p=titleStart〜 で左→右マスク展開、titleStop で停止
      //            警告: progress が BOOT_WARN_SHOW_PROGRESS 以降のみ表示（collapse 直前に強調）
      // 微違和感  : Overlap を cx+1px 固定オフセット
      // ─────────────────────────────────────────────────────────────────────────
      class BootScene extends Phaser.Scene {
        constructor() {
          super('boot');
        }

        preload() {
          // home-bg-normal を常時先読みする
          // （HomeScene が担当するが Boot では未ロードのため先行ロード）
          if (!this.textures.exists('home-bg-normal')) {
            this.load.image('home-bg-normal', 'assets/home-bg-normal.png');
          }
          if (!this.textures.exists(HOMEOVERLAP_TEX_KEY)) {
            this.load.image(HOMEOVERLAP_TEX_KEY, 'assets/overlap-title.png');
          }
          // PNG タイトル: 構造体との重ね合わせ確認用
          if (!this.textures.exists('boot-title-png')) {
            this.load.image('boot-title-png', 'assets/overlap-title.png');
          }
        }

        create() {
          console.log('[BOOT] create');
          const cx = WORLD_W / 2;
          const cy = WORLD_H / 2;

          // progress: 1つの値で全視覚状態を制御
          this._progressState = { value: 0 };
          this._progress = 0;
          this._done = false;
          this._collapsePhase = false;
          this._collapseScheduled = false;
          this._collapseT = 0;
          this._collapseDur = 1000;
          this._warnBlinkIrregular = Math.random() * Math.PI * 2;
          this._cleanedUp = false;
          this._collapseTransitionDone = false;
          this._bootFrozen = false;
          // ── 背景: 崩壊レイヤー（ドリフト付き, depth -55〜-52） ────────────
          this._bootBackdrop = mountBootCollapsedBackdrop(this, {
            width: WORLD_W,
            height: WORLD_H,
            seed: 0x70f700,
            depthBase: -55,
            structureAlpha: 1.05,
            noiseAlpha: 1,
            fragmentAlpha: 1.02,
            noiseDots: 86,
          });

          // ── 背景: home-bg-normal を常時カバー表示 (depth -51) ───────────
          // depth -51: 崩壊レイヤー(-55〜-52)より前、スキャンオーバーレイ(-40)より後ろ
          // showBootBg はデバッグ用に残す（将来的なフラグ制御用）
          this._bootBg = this.add.image(cx, cy, 'home-bg-normal')
            .setOrigin(0.5, 0.5)
            .setDepth(-51)
            .setAlpha(0);
          const bgScale = Math.max(
            this.scale.width / this._bootBg.width,
            this.scale.height / this._bootBg.height
          );
          this._bootBg.setScale(bgScale);

          // ── スキャンオーバーレイ: 未表示エリアを覆う暗幕 (depth -40) ─────
          // 背景レイヤー(-52)より前、タイトル(10+)より後ろ
          this._scanGfx = this.add.graphics().setDepth(-40);

          // スキャン先端ライン (depth -39)
          this._scanLineGfx = this.add.graphics().setDepth(-39);

          // ── 警告テキスト: 2行化（progress 0.72 以降のみ表示・collapse 直前にピーク） ──
          // 上段: CRITICAL ERROR / 下段: OVERLAP DETECTED
          // create 時点では displayHeight が未確定のため update() で配置
          this._warnText1 = this.add.text(cx, cy, 'CRITICAL ERROR', {
            fontFamily: '"Courier New", Courier, monospace',
            fontSize: '19px',
            color: '#ff1a1a',
          }).setOrigin(0.5, 0).setAlpha(0).setDepth(12);
          this._warnText2 = this.add.text(cx, cy, 'OVERLAP DETECTED', {
            fontFamily: '"Courier New", Courier, monospace',
            fontSize: '23px',
            color: '#ff3d3d',
          }).setOrigin(0.5, 0).setAlpha(0).setDepth(12);
          this._warnBlink = 0;

          // ── 警告フレーム: 2行全体を囲う欠け矩形 (depth 12) ───────────────
          this._warnFrame = this.add.graphics().setDepth(12).setAlpha(0);

          // ── 左上ログ流入: プール (最大 50 行) ────────────────────────────
          // 色はカテゴリで決定: ERROR=#ff6a6a, WARN=#ff6a6a(薄), SYS/INFO=#5f7388
          // 最新行は高アルファ、古い行は減衰
          const _LOG_FONT = {
            fontFamily: '"Courier New", Courier, monospace',
            fontSize: '13px',
            lineSpacing: 3,
          };
          const LOG_MAX = 70;
          const LOG_PAD_X = 8;
          const LOG_PAD_Y = 8;
          this._logPool = [];
          this._logLineOffsets = [];
          for (let i = 0; i < LOG_MAX; i++) {
            const lineH = 16 + Math.floor(Math.random() * 5);
            this._logLineOffsets.push(lineH);
          }
          let _logCumY = LOG_PAD_Y;
          for (let i = 0; i < LOG_MAX; i++) {
            const dx = (Math.random() - 0.5) * 4;
            const dy = (Math.random() - 0.5) * 2;
            const t = this.add.text(LOG_PAD_X + dx, _logCumY + dy, '', {
              ..._LOG_FONT,
              color: '#5f7388',
            }).setOrigin(0, 0).setAlpha(0).setDepth(11);
            this._logPool.push(t);
            _logCumY += this._logLineOffsets[i];
          }
          this._logActiveCount = 0;
          this._logTimer = 0;
          this._logMsgIndex = 0;
          this._logLastCategory = -1;
          this._logLastText = '';

          seedBootLogLines(this);

          this._bootFloatLogPool = [];
          this._bootFloatLogActive = [];
          this._bootFloatSpawnAcc = 0;
          this._bootLogScatterFrags = null;
          this._bootTitlePhase = 0;
          for (let fi = 0; fi < 14; fi++) {
            const ft = this.add.text(-900, -900, '', {
              fontFamily: '"Courier New", Courier, monospace',
              fontSize: '11px',
              color: '#8a9aaa',
            }).setOrigin(0, 0).setAlpha(0).setDepth(11);
            ft.setData('inUse', false);
            this._bootFloatLogPool.push(ft);
          }

          // GeometryMask: 左→右へ展開する矩形で PNG タイトルを段階表示
          // noTitleMask=true の場合はマスクを使わず全体を表示
          this._overlapMaskGfx = this.make.graphics({ add: false });
          if (!BOOT_DEBUG.noTitleMask) {
            this._overlapMask = this._overlapMaskGfx.createGeometryMask();
          } else {
            this._overlapMask = null;
          }

          // Overlap 描画先端の縦スキャンバー (depth 12)
          this._titleScanGfx = this.add.graphics().setDepth(12);

          // ── PNG タイトル (depth 10) ──────────────────────────────────────
          // 構造体(depth 11)より下に配置し、PNG を視覚基準として使う
          this._bootTitleImg = this.add.image(cx + 1, cy + 27, 'boot-title-png')
            .setOrigin(0.5, 0.5)
            .setDepth(10);
          const imgNatW = this._bootTitleImg.width;
          const _imgNatH = this._bootTitleImg.height;
          const _imgScale = (WORLD_W * 0.82) / (imgNatW || 1);
          this._bootTitleImg.setScale(_imgScale);
          this._bootTitleBaseScale = _imgScale;

          // _overlapMask を PNG タイトルにも共用: 同じ矩形で左→右スキャン表示
          if (!BOOT_DEBUG.noTitleMask && this._overlapMask) {
            this._bootTitleImg.setMask(this._overlapMask);
          }

          // ── progress tween: Quart.easeOut で 0→1 / 1200ms ───────────────
          // Quart.easeOut = 1-(1-t)^4: 最初速く、p=0.85 以降は極端に遅くなる
          // targets を専用オブジェクトにすることで Scene 本体を tween target にした
          // 場合の即完了バグ（rawProgress:0 のまま onComplete 発火）を回避する
          this._progressTween = this.tweens.add({
            targets: this._progressState,
            value: 1,
            duration: BOOT_DEBUG.bootDur,
            ease: 'Quart.easeOut',
            onUpdate: () => {
              this._progress = this._progressState.value;
            },
            onComplete: () => {
              this._progress = 1;
              this._done = true;
              this._scanLineGfx.clear();
              this._titleScanGfx.clear();
              this._scheduleBootCollapse(true);
            },
          });

          // progressOverride が指定されている場合は tween を即時一時停止
          if (BOOT_DEBUG.progressOverride !== null) {
            this._progressTween.pause();
          }

          // ── デバッグ HUD (?debug=1 のみ) ─────────────────────────────────────
          this._debugHud = createDebugHUD(this, () => {
            const _p = BOOT_DEBUG.progressOverride !== null ? BOOT_DEBUG.progressOverride : this._progress;
            let _phase;
            if (this._collapsePhase) {
              _phase = 'collapse';
            } else if (this._done || _p >= 1) {
              _phase = 'done';
            } else if (_p >= BOOT_WARN_SHOW_PROGRESS) {
              _phase = 'reveal';
            } else if (_p >= BOOT_DEBUG.titleStart) {
              _phase = 'title';
            } else if (_p > 0) {
              _phase = 'scan';
            } else {
              _phase = 'boot';
            }
            return {
            scene:            'boot',
            phase:            _phase,
            p:                this._progress,
            progressOverride: BOOT_DEBUG.progressOverride,
            tweenState:       this._progressTween
                                ? (this._done || _p >= 1            ? 'done'
                                :  this._progressTween.isPlaying()  ? 'playing'
                                :  this._progressTween.isPaused()   ? 'paused'
                                :                                     'pending')
                                : 'none',
            titleMask:        BOOT_DEBUG.noTitleMask ? 'off' : 'on',
            overlay:          BOOT_DEBUG.noBootOverlay ? 'off' : 'on',
            bootDur:          BOOT_DEBUG.bootDur,
            done:             this._done,
            rawProgress:      this._progress,
            tweenPlaying:     this._progressTween?.isPlaying() ?? null,
            tweenPaused:      this._progressTween?.isPaused()  ?? null,
            };
          });

          this.events.once('shutdown', () => this._cleanup());
        }

        _cleanup() {
          if (this._cleanedUp) return;
          this._cleanedUp = true;
          this._bootBackdrop?.destroy?.();
          this._scanGfx?.destroy();
          this._scanLineGfx?.destroy();
          this._titleScanGfx?.destroy();
          this._warnText1?.destroy();
          this._warnText2?.destroy();
          this._warnFrame?.destroy();
          this._warnText1 = null;
          this._warnText2 = null;
          this._warnFrame = null;
          this._bootFloatLogPool?.forEach((t) => t?.destroy?.());
          this._bootFloatLogPool = null;
          this._bootFloatLogActive = null;
          this._bootLogScatterFrags?.forEach((o) => o.txt?.destroy?.());
          this._bootLogScatterFrags = null;
          this._logPool?.forEach(t => t.destroy());
          this._logPool = null;
          this._overlapMaskGfx?.destroy();
          this._overlapMask = null;
          this._overlapMaskGfx = null;
          this._bootTitleImg?.destroy();
          this._bootTitleImg = null;
          this._bootBg = null;
          this._collapseShockOverlay?.destroy();
          this._collapseShockOverlay = null;
          this._collapseBandGfx?.destroy();
          this._collapseBandGfx = null;
          this._faultBandSpec = null;
          this._debugHud = null;
          this._progressState = null;
        }

        _teardownReconnectUI() {}

        /** 崩壊断層（黒帯）— メイン1本必須、サブは確率で追加（幾何はシード固定で毎フレーム同じ） */
        _initCollapseFaultBandSpec() {
          const H = WORLD_H;
          const mainH = Phaser.Math.FloatBetween(H * 0.06, H * 0.14);
          const mainCy = Phaser.Math.FloatBetween(H * 0.24, H * 0.47);
          const mainAlpha = Phaser.Math.FloatBetween(0.55, 0.85);
          let sub = null;
          if (Math.random() < 0.48) {
            const gapMin = mainH * 0.5 + 22;
            let subCy = Phaser.Math.FloatBetween(H * 0.14, H * 0.5);
            let guard = 0;
            while (Math.abs(subCy - mainCy) < gapMin && guard++ < 16) {
              subCy = Phaser.Math.FloatBetween(H * 0.12, H * 0.52);
            }
            sub = {
              cy: subCy,
              h: Phaser.Math.FloatBetween(H * 0.045, H * 0.11),
              alpha: Phaser.Math.FloatBetween(0.38, 0.68),
            };
          }
          this._faultBandSpec = { mainH, mainCy, mainAlpha, sub };
        }

        /**
         * @param {number} ct collapse 経過 ms
         * @param {boolean} [linesOnly=false] true で塗りを捨て再接続境界線のみ（凍結時）
         */
        _drawCollapseFaultBand(ct, linesOnly = false) {
          const W = WORLD_W;
          const spec = this._faultBandSpec;
          const g = this._collapseBandGfx;
          if (!spec || !g || g.destroyed) return;

          const peakMs = 120;
          const holdEnd = 300;
          const dur = this._collapseDur || 1100;
          const ease3 = (t) => {
            const u = 1 - Phaser.Math.Clamp(t, 0, 1);
            return 1 - u * u * u;
          };

          const pop = linesOnly ? 1 : ease3((ct + 18) / peakMs);

          const mainFillA = (() => {
            if (linesOnly) return 0;
            if (ct < peakMs) return spec.mainAlpha * pop;
            if (ct < holdEnd) return spec.mainAlpha;
            const fadeU = Phaser.Math.Clamp((ct - holdEnd) / Math.max(240, dur - holdEnd - 60), 0, 1);
            return spec.mainAlpha * (1 - ease3(fadeU) * 0.94);
          })();

          const subFillA = (() => {
            if (linesOnly || !spec.sub) return 0;
            if (ct < peakMs) return spec.sub.alpha * pop;
            if (ct < holdEnd) return spec.sub.alpha;
            const fadeU = Phaser.Math.Clamp((ct - holdEnd) / Math.max(240, dur - holdEnd - 60), 0, 1);
            return spec.sub.alpha * (1 - ease3(fadeU) * 0.92);
          })();

          const lineRamp = linesOnly
            ? 0.55
            : ct < holdEnd
              ? 0.22 + 0.16 * pop
              : Phaser.Math.Linear(0.36, 0.7, Phaser.Math.Clamp((ct - holdEnd) / 400, 0, 1));
          const strokeCol = 0x5c6d8c;

          const mainTop = spec.mainCy - spec.mainH * 0.5;
          g.clear();
          if (mainFillA > 0.018) {
            g.fillStyle(0x050508, Math.min(1, Math.max(0, mainFillA)));
            g.fillRect(0, mainTop, W, spec.mainH);
          }
          if (spec.sub) {
            const subTop = spec.sub.cy - spec.sub.h * 0.5;
            if (subFillA > 0.018) {
              g.fillStyle(0x06060a, Math.min(1, Math.max(0, subFillA)));
              g.fillRect(0, subTop, W, spec.sub.h);
            }
            const subLineA = lineRamp * (linesOnly ? 0.36 : 0.4);
            g.lineStyle(1, strokeCol, subLineA);
            g.lineBetween(0, subTop, W, subTop);
            g.lineBetween(0, subTop + spec.sub.h, W, subTop + spec.sub.h);
          }
          g.lineStyle(1.1, strokeCol, lineRamp * 0.5);
          g.lineBetween(0, mainTop, W, mainTop);
          g.lineStyle(0.85, strokeCol, lineRamp * 0.42);
          g.lineBetween(0, mainTop + spec.mainH, W, mainTop + spec.mainH);
        }

        _freezeCollapseFaultBandGfx() {
          if (!this._collapseBandGfx || this._collapseBandGfx.destroyed) return;
          this._drawCollapseFaultBand(this._collapseDur || 99999, true);
        }

        _scheduleBootCollapse(fromTweenComplete) {
          if (this._collapseScheduled || this._cleanedUp) return;
          this._collapseScheduled = true;
          this._collapsePhase = true;
          this._collapseT = 0;
          this._collapseDur = Phaser.Math.FloatBetween(1020, 1160);
          this._warnBlinkIrregular = Math.random() * Math.PI * 2;
          const cx = WORLD_W / 2;
          const cy = WORLD_H / 2;
          placeBootWarningBlock(this, cx, cy);
          this._titleBaseX = this._bootTitleImg ? this._bootTitleImg.x : 0;
          this._titleBaseY = this._bootTitleImg ? this._bootTitleImg.y : 0;
          this._titleBaseScaleX = this._bootTitleImg ? this._bootTitleImg.scaleX : 1;
          this._titleBaseScaleY = this._bootTitleImg ? this._bootTitleImg.scaleY : 1;
          this._bgBaseX = this._bootBg ? this._bootBg.x : 0;
          this._bgBaseY = this._bootBg ? this._bootBg.y : 0;
          this._bgBaseAlpha = this._bootBg ? this._bootBg.alpha : 1;
          if (fromTweenComplete && this._progressTween) {
            this._progressTween.remove();
            this._progressTween = null;
          }
          if (this._bootTitleImg) {
            this._bootTitleImg.clearMask(true);
          }
          this._collapseLogGhostIdx = new Set();
          const na = this._logActiveCount | 0;
          if (na >= 1) {
            const a = Phaser.Math.Between(0, na - 1);
            this._collapseLogGhostIdx.add(a);
            if (na >= 2) {
              let b = Phaser.Math.Between(0, na - 1);
              let guard = 0;
              while (b === a && guard++ < 10) b = Phaser.Math.Between(0, na - 1);
              if (b !== a) this._collapseLogGhostIdx.add(b);
            }
          }
          bootSpawnCollapseLogScatters(this);
          registerBootYLetterFragments(this);
          const pulseErrLog = () => {
            if (!this._logPool) return;
            const m = this._logActiveCount | 0;
            for (let i = 0; i < m; i++) {
              const t = this._logPool[i];
              const tx = t.text || '';
              if (tx.includes('[ERROR]')) {
                t.setStyle({ color: '#ff2020' });
                t.setAlpha(1);
              }
            }
          };
          const relaxErrLog = () => {
            if (!this._logPool) return;
            const m = this._logActiveCount | 0;
            for (let i = 0; i < m; i++) {
              const t = this._logPool[i];
              if ((t.text || '').includes('[ERROR]')) {
                t.setStyle({ color: '#ff6a6a' });
              }
            }
          };
          pulseErrLog();
          this.time.delayedCall(68, relaxErrLog);
          if (this._warnText1 && this._warnText2) {
            this._warnText1.setAlpha(Math.max(this._warnText1.alpha, 0.94));
            this._warnText2.setAlpha(Math.max(this._warnText2.alpha, 0.9));
          }
          const overlapT0 = performance.now();
          captureBootOverlapCollapseStartHandoff(this._bootTitleImg, this.game.registry);
          this.game.registry.set(OVERLAP_REBUILD_T0_KEY, overlapT0);
          this.game.registry.set(REG_BOOT_HOME_WAIT_COLLAPSE, true);
          this._collapseBandGfx?.destroy();
          this._collapseBandGfx = this.add.graphics().setDepth(-50);
          this._initCollapseFaultBandSpec();
          this._drawCollapseFaultBand(0);
          if (this._bootBg && !this._bootBg.destroyed) {
            const natW = this._bootBg.width;
            const natH = this._bootBg.height;
            const bgScale = this._bootBg.scaleX;
            this._bootBg.setVisible(false);
            spawnBootBgCollapseFragments(
              this,
              WORLD_W,
              WORLD_H,
              this._bootBg.x,
              this._bootBg.y,
              bgScale,
              natW,
              natH,
              this._faultBandSpec,
              overlapT0,
            );
          }
          this._collapseShockOverlay?.destroy();
          this._collapseShockOverlay = this.add
            .rectangle(cx, cy, WORLD_W, WORLD_H, 0x020308, 0)
            .setDepth(-33);
          this.tweens.add({
            targets: this._collapseShockOverlay,
            alpha: 0.52,
            duration: 46,
            ease: 'Quad.easeOut',
            onComplete: () => {
              if (this._collapseShockOverlay && !this._collapseShockOverlay.destroyed) {
                this.tweens.add({
                  targets: this._collapseShockOverlay,
                  alpha: 0,
                  duration: 84,
                  ease: 'Sine.easeIn',
                  onComplete: () => {
                    this._collapseShockOverlay?.destroy();
                    this._collapseShockOverlay = null;
                  },
                });
              }
            },
          });
          // 構造グリッド: ショック中は欠損感のため低 alpha、0.3〜0.6 で本立ち上げ（containers[1]）
          const _structC = this._bootBackdrop?.containers?.[1];
          if (_structC) _structC.setAlpha(0);
          console.log('[BootScene] collapse phase start', this._collapseDur, 'ms');

          if (this._bootTitleImg && !this._bootTitleImg.destroyed) {
            this._bootTitleImg.setVisible(false);
          }
          if (!this.scene.isActive('home')) {
            this.scene.launch('home');
          }
        }

        /** Collapse 完了直前: 残骸を静止化し depth を Home より下へ（destroy / visible 変更なし） */
        _freezeBootWreckForHome() {
          if (this._bootBackdrop?.convergeLayers) {
            this._bootBackdrop.convergeLayers(1, 'Linear');
          }
          this._freezeCollapseFaultBandGfx();

          if (this._bootBg) {
            this._bootBg.setDepth(0);
            this._bootBg.setPosition(this._bootBg.x, this._bootBg.y);
            this._bootBg.setAlpha(Phaser.Math.FloatBetween(0.22, 0.28));
          }

          if (this._bootTitleImg) {
            this._bootTitleImg.setDepth(5);
            this._bootTitleImg.setPosition(this._bootTitleImg.x, this._bootTitleImg.y);
            this._bootTitleImg.setScale(this._bootTitleImg.scaleX, this._bootTitleImg.scaleY);
            this._bootTitleImg.setRotation(this._bootTitleImg.rotation);
            this._bootTitleImg.setAlpha(Phaser.Math.FloatBetween(0.22, 0.28));
          }

          if (this._logPool) {
            this._logPool.forEach((t) => t.setDepth(4));
          }

          const warnDepth = 6;
          const warnA = Phaser.Math.FloatBetween(0.23, 0.27);
          if (this._warnText1) {
            this._warnText1.setDepth(warnDepth);
            this._warnText1.setAlpha(warnA);
          }
          if (this._warnText2) {
            this._warnText2.setDepth(warnDepth);
            this._warnText2.setAlpha(warnA);
          }
          if (this._warnFrame && this._warnLayout) {
            this._warnFrame.setDepth(warnDepth);
            const L = this._warnLayout;
            const gf = this._warnFrame;
            const { rx, ry, rw, rh, corner } = L;
            gf.clear();
            gf.fillStyle(0x6b2830, 0.10);
            gf.fillRect(rx, ry, rw, rh);
            gf.lineStyle(1, 0x8b3b42, 0.75);
            gf.lineBetween(rx + corner, ry, rx + rw - corner * 2.5, ry);
            gf.lineBetween(rx + rw, ry + corner * 2, rx + rw, ry + rh - corner);
            gf.lineBetween(rx + corner * 2.5, ry + rh, rx + rw - corner, ry + rh);
            gf.lineBetween(rx, ry + corner, rx, ry + rh - corner * 2);
            gf.lineStyle(2, 0x7a3038, 0.45);
            gf.lineBetween(rx + corner, ry, rx + rw * 0.4, ry);
            gf.lineBetween(rx, ry + corner, rx, ry + rh * 0.45);
            this._warnFrame.setAlpha(0.5);
          }

          this._bootFrozen = true;
        }

        _finishBootAfterCollapse() {
          if (this._cleanedUp || this._collapseTransitionDone) return;
          this._collapseTransitionDone = true;
          this._teardownReconnectUI();
          this._freezeBootWreckForHome();
          destroyBootBgPanelForHome(this);
          this.game.registry.set(REG_BOOT_COLLAPSE_DONE_FOR_HOME, true);
          this.game.registry.remove(REG_BOOT_HOME_WAIT_COLLAPSE);
          console.log('[BootScene] overlap handoff → home (wreck retained)');
          if (!this.scene.isActive('home')) {
            this.scene.launch('home');
          }
        }

        update() {
          if (this._cleanedUp) return;
          if (this._bootFrozen) return;
          if (!this._updateLogged) { console.log('[BOOT] update'); this._updateLogged = true; }

          let p = this._progress;
          if (BOOT_DEBUG.progressOverride !== null) {
            p = BOOT_DEBUG.progressOverride;
            if (this._progressTween?.isPlaying()) {
              this._progressTween.pause();
            }
            if (p >= 1 && !this._collapseScheduled) {
              this._progress = 1;
              this._done = true;
              this._scanLineGfx?.clear();
              this._titleScanGfx?.clear();
              this._scheduleBootCollapse(false);
            }
          }
          const pTitle = BOOT_DEBUG.progressOverride !== null ? p : bootTitleProgressHitch(p);
          const W = WORLD_W;
          const H = WORLD_H;
          const cx = W / 2;
          const cy = H / 2;

          // ── 崩壊フェーズ完了 → handoff 後に Home 起動（実際の再接続は Home 側の破片収束）
          if (this._collapsePhase && !this._cleanedUp) {
            const dt = this.game.loop.delta;

            this._collapseT += dt;
            const collapseNorm = Math.min(1, this._collapseT / this._collapseDur);

            updateBootFloatLogs(this, dt, 1, W, H, cx, cy);

            const _structLayer = this._bootBackdrop?.containers?.[1];
            const _baseLayer = this._bootBackdrop?.containers?.[0];
            const ct = this._collapseT;
            if (_structLayer) {
              let gridLayerA = 0;
              if (ct < 125) {
                gridLayerA = 0.06 + Math.random() * 0.12;
              } else if (collapseNorm > 0.3) {
                const u = Phaser.Math.Clamp((collapseNorm - 0.3) / (0.6 - 0.3), 0, 1);
                gridLayerA = u * 0.45;
              }
              _structLayer.setAlpha(gridLayerA);
            }
            if (_baseLayer) {
              if (ct < 110) {
                _baseLayer.setAlpha(0.68 + Math.random() * 0.1);
              } else if (ct < 220) {
                const u = Phaser.Math.Clamp((ct - 110) / 110, 0, 1);
                _baseLayer.setAlpha(Phaser.Math.Linear(0.74, 1, u));
              } else {
                _baseLayer.setAlpha(1);
              }
            }

            if (this._collapseBandGfx && !this._collapseBandGfx.destroyed) {
              this._drawCollapseFaultBand(ct);
            }

            updateBootBgCollapseFragments(this, ct, dt, W, H);

            updateBootLogScatters(this, collapseNorm, dt);

            if (!BOOT_DEBUG.noBootOverlay) {
              if (ct < 128) {
                this._scanGfx.clear();
                const y0 = Math.round(H * Phaser.Math.FloatBetween(0.22, 0.62));
                const h0 = Math.round(H * Phaser.Math.FloatBetween(0.06, 0.16));
                this._scanGfx.fillStyle(0x070910, Phaser.Math.FloatBetween(0.28, 0.42));
                this._scanGfx.fillRect(0, y0, W, h0);
                if (Math.random() < 0.55) {
                  const y1 = Math.round(H * Phaser.Math.FloatBetween(0.35, 0.92));
                  this._scanGfx.fillStyle(0x0a0d14, Phaser.Math.FloatBetween(0.22, 0.38));
                  this._scanGfx.fillRect(0, y1, W, Phaser.Math.FloatBetween(14, 40));
                }
                this._scanLineGfx.clear();
                const jy = y0 + Math.round((Math.random() - 0.5) * 16);
                this._scanLineGfx.lineStyle(1.2, 0x5ee8dc, Phaser.Math.FloatBetween(0.35, 0.72));
                this._scanLineGfx.lineBetween(Phaser.Math.FloatBetween(-20, 40), jy, W - Phaser.Math.FloatBetween(0, 50), jy + Math.round((Math.random() - 0.5) * 12));
                if (this._titleScanGfx) {
                  this._titleScanGfx.clear();
                  const vx = Phaser.Math.FloatBetween(W * 0.15, W * 0.92);
                  this._titleScanGfx.fillStyle(0xffffff, Phaser.Math.FloatBetween(0.08, 0.22));
                  this._titleScanGfx.fillRect(vx, 0, Phaser.Math.FloatBetween(2, 5), H);
                }
              } else if (ct < 140) {
                this._scanGfx.clear();
                this._scanLineGfx.clear();
                this._titleScanGfx?.clear();
              }
            }

            if (this._bootBg && this._bootBg.visible) {
              let bgTarget = Phaser.Math.Clamp(
                0.25 + 0.05 * Math.sin(this._collapseT * 0.0014) + (Math.random() - 0.5) * 0.05,
                0.2,
                0.3,
              );
              if (ct < 115) {
                bgTarget *= Phaser.Math.FloatBetween(0.45, 0.62);
              }
              this._bootBg.setAlpha(bgTarget);
              const bgShake = Phaser.Math.FloatBetween(2, 4);
              this._bootBg.setPosition(
                this._bgBaseX + (Math.random() - 0.5) * 2 * bgShake,
                this._bgBaseY + (Math.random() - 0.5) * 2 * bgShake,
              );
            }

            if (this._bootTitleImg && this._bootTitleImg.visible) {
              const titleShake = Phaser.Math.FloatBetween(3, 6);
              const ax = this._titleBaseX + (Math.random() - 0.5) * 2 * titleShake;
              const ay = this._titleBaseY + (Math.random() - 0.5) * 2 * titleShake;
              this._bootTitleImg.setPosition(ax, ay);
              const sc = Phaser.Math.FloatBetween(0.98, 1.02);
              this._bootTitleImg.setScale(this._titleBaseScaleX * sc, this._titleBaseScaleY * sc);
              this._bootTitleImg.setRotation(Phaser.Math.FloatBetween(-0.02, 0.02));
              const titleA = Phaser.Math.Clamp(
                0.25 + 0.06 * Math.sin(this._collapseT * 0.0021) + (Math.random() - 0.5) * 0.04,
                0.15,
                0.35,
              );
              this._bootTitleImg.setAlpha(titleA);
            }

            if (this._warnText1 && this._warnText2) {
              this._warnFrameCritical = ct < 140;
              placeBootWarningBlock(this, cx, cy);
              this._warnBlinkIrregular += dt * Phaser.Math.FloatBetween(0.028, 0.095);
              const b1 = Math.sin(this._warnBlinkIrregular) * 0.5 + 0.5;
              const b2 = Math.sin(this._warnBlinkIrregular * 1.73 + 1.31) * 0.5 + 0.5;
              const chaos = (Math.random() - 0.5) * 0.04;
              let a1 = Phaser.Math.Clamp(0.58 + b1 * 0.32 + chaos, 0.52, 1);
              let a2 = Phaser.Math.Clamp(0.54 + b2 * 0.34 - chaos, 0.5, 1);
              if (ct < 105) {
                const boost = 1 - ct / 105;
                a1 = Phaser.Math.Clamp(a1 + 0.22 * boost, 0.55, 1);
                a2 = Phaser.Math.Clamp(a2 + 0.2 * boost, 0.52, 1);
              }
              this._warnText1.setAlpha(a1);
              this._warnText2.setAlpha(a2);
              this._warnFrame.setAlpha(
                ct < 118
                  ? Phaser.Math.Clamp(0.9 + Math.random() * 0.08, 0.88, 1)
                  : Phaser.Math.Clamp(0.75 + b1 * 0.2, 0.68, 0.95),
              );
            }

            if (this._logPool) {
              const collapseMsgs = BOOT_LOG_MESSAGES_COLLAPSE.length ? BOOT_LOG_MESSAGES_COLLAPSE : BOOT_LOG_MESSAGES_C;
              this._logTimer += dt;
              const interval = 22 + Math.random() * 26;
              if (this._logTimer >= interval && this._logActiveCount < this._logPool.length) {
                this._logTimer = 0;
                const t = this._logPool[this._logActiveCount];
                let tries = 0;
                let entry = collapseMsgs[this._logMsgIndex % collapseMsgs.length];
                while (
                  tries < collapseMsgs.length &&
                  entry.text === this._logLastText
                ) {
                  this._logMsgIndex++;
                  entry = collapseMsgs[this._logMsgIndex % collapseMsgs.length];
                  tries++;
                }
                this._logLastCategory = entry.cat;
                this._logLastText = entry.text;
                this._logMsgIndex++;
                t.setStyle({ color: '#ff6a6a' });
                t.setText(entry.text);
                t.setStyle({ letterSpacing: Phaser.Math.FloatBetween(-0.5, 0.5) });
                t.setAlpha(1.0);
                this._logActiveCount++;
              }
              applyBootCollapseLogVisuals(this);
            }

            if (this._collapseT >= this._collapseDur) {
              this._finishBootAfterCollapse();
            }
            this._debugHud?.tick();
            return;
          }

          // ── フェーズ2: 背景スキャン（上から下へ表示範囲を拡大） ──────────
          // alpha と revealY は同一 bgEase（easeInCubic: 最初ゆっくり、後半で速く）
          const bgStart = 0.18;
          const bgEnd = 0.95;
          const bgT = Phaser.Math.Clamp((p - bgStart) / (bgEnd - bgStart), 0, 1);
          const bgEase = bgT * bgT * bgT;
          if (this._bootBg) this._bootBg.setAlpha(bgEase);
          const revealY = Math.round(H * bgEase);

          // 未表示エリアの暗幕 (?noBootOverlay=1 で無効化)
          this._scanGfx.clear();
          if (!BOOT_DEBUG.noBootOverlay && revealY < H) {
            this._scanGfx.fillStyle(0x090b12, 0.97);
            this._scanGfx.fillRect(0, revealY, W, H - revealY);
          }

          // 水平スキャンライン（先端）
          this._scanLineGfx.clear();
          if (!this._done && revealY > 0 && revealY < H) {
            this._scanLineGfx.lineStyle(1.5, 0x4af0e4, 0.88);
            this._scanLineGfx.lineBetween(0, revealY, W, revealY);
            this._scanLineGfx.lineStyle(7, 0x4af0e4, 0.10);
            this._scanLineGfx.lineBetween(0, revealY, W, revealY);
          }

          if (pTitle >= 0.5 && pTitle < 1 && this._bootTitleImg && !this._done) {
            const k = Phaser.Math.Clamp((pTitle - 0.5) / 0.48, 0, 1);
            const mag = k * k * 5.5;
            this._bootTitlePhase += this.game.loop.delta * (0.0026 + k * 0.007);
            const ox = Math.sin(this._bootTitlePhase * 1.63) * mag * 0.2;
            const oy = Math.cos(this._bootTitlePhase * 1.21) * mag * 0.15;
            const sc = 1 + k * 0.007 * Math.sin(this._bootTitlePhase * 0.88);
            this._bootTitleImg.setPosition(cx + 1 + ox, cy + 27 + oy);
            const bs = this._bootTitleBaseScale ?? (WORLD_W * 0.82) / (this._bootTitleImg.width || 1);
            this._bootTitleImg.setScale(bs * sc, bs * sc);
          } else if (this._bootTitleImg && pTitle < 0.5) {
            const imgNatW = this._bootTitleImg.width;
            const bs = (WORLD_W * 0.82) / (imgNatW || 1);
            this._bootTitleImg.setPosition(cx + 1, cy + 27);
            this._bootTitleImg.setScale(bs, bs);
          }

          // ── フェーズ3: PNG タイトル（p=titleStart〜） ─────────────────
          const { titleStart, titleStop, noTitleMask } = BOOT_DEBUG;
          if (pTitle < titleStart) {
            this._overlapMaskGfx.clear();
            this._titleScanGfx.clear();
          } else {
            const titleP = titleStart < 1 ? (pTitle - titleStart) / (1 - titleStart) : 1; // 0→1 as p: titleStart→1.0

            // 左→右マスク展開: 最大 titleStop 幅（最後の約1文字が未表示のまま停止）
            const revealWidth = noTitleMask ? 1 : Math.min(titleStop, titleP * titleStop);

            // PNG タイトルを基準にマスク矩形を算出（PNG の方が幅広のため）
            const imgDW = this._bootTitleImg.displayWidth;
            const imgDH = this._bootTitleImg.displayHeight;
            const leftX  = this._bootTitleImg.x - imgDW * 0.5;
            const topY   = this._bootTitleImg.y  - imgDH * 0.5;
            const maskW  = noTitleMask ? imgDW + 16 : Math.max(0, Math.round(imgDW * revealWidth));

            this._overlapMaskGfx.clear();
            if (!noTitleMask) {
              if (maskW > 0) {
                this._overlapMaskGfx.fillStyle(0xffffff, 1);
                this._overlapMaskGfx.fillRect(leftX - 8, topY - 6, maskW + 8, imgDH + 12);
              }
            }

            // 描画先端の縦スキャンバー (文字実体部分相当・グレー系・低主張)
            this._titleScanGfx.clear();
            if (!noTitleMask && !this._done && maskW > 0 && revealWidth < titleStop) {
              const scanX  = leftX + maskW;
              const scanH  = imgDH * 0.25;
              const scanY0 = topY + imgDH * 0.375;
              this._titleScanGfx.lineStyle(1, 0x8a9096, 0.20);
              this._titleScanGfx.lineBetween(scanX, scanY0, scanX, scanY0 + scanH);
              this._titleScanGfx.lineStyle(2, 0x7a7f85, 0.06);
              this._titleScanGfx.lineBetween(scanX, scanY0, scanX, scanY0 + scanH);
            }
          }

          // ── 警告テキスト2行: progress 0.72 以降のみ（collapse 直前に強いピーク） ──
          if (p < BOOT_WARN_SHOW_PROGRESS) {
            this._warnText1.setAlpha(0);
            this._warnText2.setAlpha(0);
            this._warnFrame.setAlpha(0);
          } else {
            const ramp = Phaser.Math.Clamp(
              (p - BOOT_WARN_SHOW_PROGRESS) /
                Math.max(0.001, BOOT_WARN_RAMP_END_PROGRESS - BOOT_WARN_SHOW_PROGRESS),
              0,
              1,
            );
            const burst = p < BOOT_WARN_SHOW_PROGRESS + 0.042 ? 1 - (p - BOOT_WARN_SHOW_PROGRESS) / 0.042 : 0;
            this._warnFrameCritical = burst > 0.15;
            placeBootWarningBlock(this, cx, cy);
            this._warnBlink = (this._warnBlink || 0) + this.game.loop.delta * 0.0024;
            const blinkA = 0.9 + Math.sin(this._warnBlink) * 0.08;
            const aBase = Phaser.Math.Linear(0.78, 0.98, ramp);
            const a1 = Phaser.Math.Clamp(aBase + burst * 0.28, 0, 1);
            const a2 = Phaser.Math.Clamp(aBase * blinkA + burst * 0.22, 0, 1);
            this._warnText1.setAlpha(a1);
            this._warnText2.setAlpha(a2);
            this._warnFrame.setAlpha(Phaser.Math.Clamp(0.82 + ramp * 0.16 + burst * 0.12, 0, 1));
          }

          // ── 左上ログ流入: 開始は常時 ON、内容のみ progress で Phase 切替 ──
          // Phase A (p < 0.55): SYS / INFO
          // Phase B (0.55〜0.82): WARN 混在
          // Phase C (p > 0.82): ERROR 増殖
          let _activeMessages;
          if (p < 0.55) {
            _activeMessages = BOOT_LOG_MESSAGES_A;
          } else if (p < 0.82) {
            _activeMessages = BOOT_LOG_MESSAGES_B;
          } else {
            _activeMessages = BOOT_LOG_MESSAGES_C;
          }

          if (this._logPool) {
            const delta = this.game.loop.delta;
            this._logTimer += delta;
            // progress が進むほど追加間隔が短くなる（式は従来どおり）
            let interval;
            if (p < 0.55) {
              interval = Phaser.Math.Linear(300, 165, Math.max(0, (p - 0.2) / 0.35));
            } else if (p < 0.82) {
              interval = Phaser.Math.Linear(175, 95, (p - 0.55) / 0.27);
            } else {
              interval = Phaser.Math.Linear(115, 52, (p - 0.82) / 0.18);
            }
            if (this._logTimer >= interval && this._logActiveCount < this._logPool.length) {
              this._logTimer = 0;
              const t = this._logPool[this._logActiveCount];
              // 同カテゴリ連続・同一テキスト連続を回避
              let tries = 0;
              let entry = _activeMessages[this._logMsgIndex % _activeMessages.length];
              while (
                tries < _activeMessages.length &&
                (entry.cat === this._logLastCategory || entry.text === this._logLastText)
              ) {
                this._logMsgIndex++;
                entry = _activeMessages[this._logMsgIndex % _activeMessages.length];
                tries++;
              }
              this._logLastCategory = entry.cat;
              this._logLastText = entry.text;
              this._logMsgIndex++;

              // カテゴリ別色設定
              const isError = entry.cat === 0;
              const isWarn  = entry.cat === 1;
              t.setStyle({ color: (isError || isWarn) ? '#ff6a6a' : '#5f7388' });
              t.setText(entry.text);
              t.setStyle({ letterSpacing: Phaser.Math.FloatBetween(-0.5, 0.5) });

              // 最新行は高アルファ、古い行は徐々に減衰
              const totalActive = this._logActiveCount;
              for (let _li = 0; _li < totalActive; _li++) {
                const age = totalActive - _li;
                const baseA = age === 0 ? 1.0 : Math.max(0.6, 1.0 - age * 0.06);
                this._logPool[_li].setAlpha(baseA);
              }
              t.setAlpha(1.0);
              this._logActiveCount++;
            }
          }

          updateBootFloatLogs(this, this.game.loop.delta, p, W, H, cx, cy);

          this._debugHud?.tick();
        }
      }

            this.state.stickOrigin.set(pointer.worldX, pointer.worldY);
            this.state.stickOffset.set(0, 0);
            this.state.desiredVel.set(0, 0);
            this.state.snapBack.lastStrongInputAt = Number.NEGATIVE_INFINITY;
            this.state.snapBack.lastDetectedAt = Number.NEGATIVE_INFINITY;
            this.state.snapBack.lastStrongInputDir.set(0, 0);
            this.state.snapBack.lastInputPower = 0;

          this.input.on('pointermove', (pointer) => {
            if (this.state.pointerId === null && pointer.isDown) {
              this.state.pointerId = pointer.id;
              this.state.stickOrigin.set(pointer.worldX, pointer.worldY);
              this.state.stickOffset.set(0, 0);
            }
            if (pointer.id !== this.state.pointerId) return;
            const stickMaxRadius = 132;
            const deadZone = 14;
            let dx = pointer.worldX - this.state.stickOrigin.x;
            let dy = pointer.worldY - this.state.stickOrigin.y;
            const len = Math.hypot(dx, dy);
            if (len > stickMaxRadius) {
              const c = stickMaxRadius / len;
              dx *= c;
              dy *= c;
            }
            this.state.stickOffset.set(dx, dy);
            const mag = Math.hypot(dx, dy);
            const movePower = Phaser.Math.Clamp((mag - deadZone) / (stickMaxRadius - deadZone), 0, 1);
            if (mag <= deadZone) {
              this.state.desiredVel.set(0, 0);
              this.state.snapBack.lastInputPower = 0;

            const nx = dx / mag;
            const ny = dy / mag;

            this.toggleBuildDirection();

          return Phaser.Math.Clamp(this.state.energy / 220, 0, 1);

        getSnapReleaseProfile() {
          const energyNorm = this.getEnergyNormalized();
          return {
            energyNorm,
            radius: Phaser.Math.Linear(150, 350, energyNorm),
            intensity: Phaser.Math.Linear(0.65, 1.45, energyNorm),
          };
        }

        getXpMagnetConfig() {
          const buildXpTuning = getActiveBuildTuning().xpAttraction;
          const baseConfig = {
            radius: 150 * buildXpTuning.radiusScale,
            maxSpeed: 165,
            lerp: 0.12,
          };
          if (this.time.now >= this.state.xpMagnetBurst.activeUntil) {
            return baseConfig;
          }
          return {
            radius: baseConfig.radius * this.state.xpMagnetBurst.radiusMultiplier,
            maxSpeed: baseConfig.maxSpeed * this.state.xpMagnetBurst.speedMultiplier,
            lerp: Math.min(1, baseConfig.lerp * this.state.xpMagnetBurst.lerpMultiplier),
          };
        }

        triggerXpMagnetBurst(releaseIntensity = 1) {
          const magnetBurst = this.state.xpMagnetBurst;
          const shortAfterEffectMs = Phaser.Math.Clamp(
            magnetBurst.durationMs * Phaser.Math.Linear(1.06, 1.22, Phaser.Math.Clamp(releaseIntensity - 0.85, 0, 1)),
            magnetBurst.durationMs,
            magnetBurst.durationMs + 90,

          magnetBurst.activeUntil = this.time.now + shortAfterEffectMs;

            360,
