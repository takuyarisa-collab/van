<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="icon" href="data:," />
  <title>Static Phaser Prototype</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #090b12;
      overflow: hidden;
      touch-action: none;
      font-family: system-ui, sans-serif;
    }
    body {
      display: grid;
      place-items: center;
    }
    #game-wrap {
      width: min(100vw, calc(100vh * 9 / 16));
      height: min(100vh, calc(100vw * 16 / 9));
      max-width: 560px;
      max-height: 1000px;
      border: 1px solid #2a2f44;
      border-radius: 12px;
      overflow: hidden;
      background: #101425;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="game-wrap"></div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script>
    (() => {
      const WORLD_W = 540;
      const WORLD_H = 960;
      const PLAYER_SPRITE_SVG = `
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
          <defs>
            <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#73d8ff"/>
              <stop offset="100%" stop-color="#1f8fe2"/>
            </linearGradient>
          </defs>
          <circle cx="24" cy="24" r="15" fill="#0b2a4b" opacity="0.35"/>
          <path d="M24 6 L36 18 L31 38 L17 38 L12 18 Z" fill="url(#body)" stroke="#d7f6ff" stroke-width="2"/>
          <rect x="21" y="15" width="6" height="10" rx="2" fill="#e9fbff"/>
          <circle cx="19" cy="27" r="2.2" fill="#e9fbff"/>
          <circle cx="29" cy="27" r="2.2" fill="#e9fbff"/>
          <path d="M18 33 Q24 36 30 33" stroke="#0f5f9b" stroke-width="2.2" fill="none"/>
        </svg>
      `.trim();
      const PLAYER_SPRITE_DATA_URI = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(PLAYER_SPRITE_SVG)}`;
      const VISUAL_ASSETS = {
        player: {
          textureKey: 'playerSprite',
          hitRadius: 14,
        },
        enemies: [
          {
            type: 'blob',
            textureKey: 'enemyA',
            hitRadius: 12,
            generatePlaceholder(g) {
              g.fillStyle(0xf05b5b).fillCircle(12, 12, 11);
              g.fillStyle(0xff9e9e).fillCircle(8, 10, 2).fillCircle(16, 10, 2);
              g.fillStyle(0x8c1f1f).fillRect(8, 15, 8, 2);
              g.generateTexture(this.textureKey, 24, 24);
              g.clear();
            },
          },
          {
            type: 'drone',
            textureKey: 'enemyB',
            hitRadius: 12,
            generatePlaceholder(g) {
              g.fillStyle(0x7b5df5).fillRoundedRect(4, 6, 16, 12, 3);
              g.fillStyle(0xaf9cff).fillRect(8, 9, 8, 3);
              g.fillStyle(0x3f2ca6).fillRect(2, 10, 3, 4).fillRect(19, 10, 3, 4);
              g.fillStyle(0xdcd3ff).fillCircle(12, 16, 2);
              g.generateTexture(this.textureKey, 24, 24);
              g.clear();
            },
          },
        ],
        attack: {
          bullet: {
            textureKey: 'bullet',
            hitRadius: 6,
            generatePlaceholder(g) {
              g.fillStyle(0xfff38a).fillCircle(6, 6, 6);
              g.generateTexture(this.textureKey, 12, 12);
              g.clear();
            },
          },
        },
        xp: {
          textureKey: 'xp',
          hitRadius: 8,
          generatePlaceholder(g) {
            g.fillStyle(0x7fffd0, 0.12).fillCircle(12, 12, 11);
            g.fillStyle(0x8fffd8, 0.2).fillCircle(12, 12, 7);
            g.fillStyle(0xb6ffe6, 0.42).fillCircle(12, 12, 4);
            g.fillStyle(0xeafff7, 1).fillCircle(12, 12, 2);
            g.generateTexture(this.textureKey, 24, 24);
            g.clear();
          },
        },
      };
      /** 1フレーム相当の ms（慣性の旧 0.12 / フレーム と同等の体感になる基準） */
      const INERTIA_REF_MS = 1000 / 60;
      const SNAP_BACK_RESULT = {
        SUCCESS_CANDIDATE: 'success candidate',
        NEAR_MISS: 'near miss',
        FAIL: 'fail',
      };
      const APP_VERSION = '0.1.4';
      const BUILD_TIMESTAMP = '2026-04-05 14:58';
      const BUILD_COMMIT_SHORT = 'local';
      const BUILD_STAMP = `${APP_VERSION} / ${BUILD_TIMESTAMP}${BUILD_COMMIT_SHORT ? ` / ${BUILD_COMMIT_SHORT}` : ''}`;
      const BUILD_DIRECTION = {
        SNAP: 'snap',
        STABILITY: 'stability',
      };
      const DOUBLE_TAP_TOGGLE_WINDOW_MS = 250;
      let activeBuildDirection = BUILD_DIRECTION.SNAP;
      const BUILD_DIRECTION_TUNING = {
        [BUILD_DIRECTION.SNAP]: {
          playerTrail: {
            lifespanScale: 0.84,
            alphaScale: 1.14,
            frequencyScale: 0.88,
          },
          snapRipple: {
            strokeScale: 1.12,
            alphaScale: 1.1,
            durationScale: 0.88,
          },
          xpAttraction: {
            radiusScale: 1,
            trailIntervalScale: 1,
            trailAlphaScale: 1,
            trailTailScale: 1,
          },
        },
        [BUILD_DIRECTION.STABILITY]: {
          playerTrail: {
            lifespanScale: 1.16,
            alphaScale: 0.92,
            frequencyScale: 1.12,
          },
          snapRipple: {
            strokeScale: 0.96,
            alphaScale: 0.95,
            durationScale: 1.08,
          },
          xpAttraction: {
            radiusScale: 1.08,
            trailIntervalScale: 0.84,
            trailAlphaScale: 1.1,
            trailTailScale: 1.16,
          },
        },
      };
      const ENEMY_BEHAVIOR_TYPES = {
        CHASER: 'chaser',
        SWARM: 'swarm',
        DRIFTER: 'drifter',
      };
      const VISUAL_SCALE = {
        player: 1.3,
        enemy: 1.12,
        enemySwarm: 0.82,
        bullet: 1.14,
        xp: 1,
      };
      const XP_VISUAL = {
        pulseSpeed: 0.0074,
        pulseScale: 0.06,
        pulseAlpha: 0.2,
        pullSpeedThreshold: 28,
        stretchMax: 0.38,
        glowBoostMax: 0.46,
        trailSpeedThreshold: 120,
        trailStrongThreshold: 210,
        trailBaseIntervalMs: 120,
        trailPullIntervalMs: 14,
        trailOffsetMin: 8,
        trailOffsetMax: 24,
        trailBackOffsetMin: 14,
        trailBackOffsetMax: 42,
        trailLifespanMin: 190,
        trailLifespanMax: 420,
        trailAlphaMin: 0.18,
        trailAlphaMax: 0.5,
        trailScaleMin: 0.34,
        trailScaleMax: 0.62,
        trailSpeedMin: 18,
        trailSpeedMax: 72,
      };
      const XP_PICKUP_FEEDBACK = {
        pulseLifespanMs: 120,
        pulseScaleStart: 0.34,
        pulseScaleEnd: 1.12,
        pulseAlphaStart: 0.42,
      };
      const NEAR_ATTACK_PROFILE = {
        range: 186,
        width: 44,
        damage: 1,
      };
      const NEAR_ATTACK_VISUAL = {
        length: NEAR_ATTACK_PROFILE.range,
        width: NEAR_ATTACK_PROFILE.width,
        color: 0xcfe6ff,
        alpha: 0.86,
        edgeColor: 0xf3fbff,
        edgeAlpha: 0.62,
        edgeWidth: 2,
        durationMs: 260,
        steerLerp: 0.2,
        maxSteerStepRad: 0.12,
        steerDurationMs: 110,
        minSteerSpeed: 58,
      };
      const NEAR_ATTACK_HIT_TUNING = {
        widthPadding: 8,
        lengthPadding: 6,
        enemyRadiusScale: 0.45,
        enemyRadiusMin: 4,
        enemyRadiusMax: 11,
        debugHitFlashMs: 110,
      };
      const DEBUG_NEAR_ATTACK_HITBOX = true;
      const SNAP_AUDIO = {
        sampleRate: 32000,
        peakVolume: 0.24,
        durationSec: 0.1,
        pullSec: 0.018,
        burstSec: 0.03,
        tailSec: 0.052,
        minIntervalMs: 70,
      };
      const PLAYER_TRAIL_VISUAL = {
        minSpeed: 36,
        fullSpeed: 360,
        frequencySlow: 44,
        frequencyFast: 14,
        lifespanSlow: 120,
        lifespanFast: 210,
        scaleStartSlow: 0.34,
        scaleStartFast: 0.62,
        scaleEndSlow: 0.08,
        scaleEndFast: 0.03,
        alphaSlow: 0.18,
        alphaFast: 0.42,
      };
      const getActiveBuildTuning = () => BUILD_DIRECTION_TUNING[activeBuildDirection] || BUILD_DIRECTION_TUNING[BUILD_DIRECTION.SNAP];

      class GameScene extends Phaser.Scene {
        constructor() {
          super('game');
        }

        preload() {
          this.load.image(VISUAL_ASSETS.player.textureKey, PLAYER_SPRITE_DATA_URI);
        }

        create() {
          this.buildVisualAssets();
          this.lastTapAt = Number.NEGATIVE_INFINITY;
          this.activeNearAttack = null;

          this.state = {
            hp: 100,
            level: 1,
            xp: 0,
            xpToNext: 10,
            energy: 0,
            fireRate: 320,
            moveSpeed: 300,
            inertia: 0.12,
            accelerationBoost: 1.85,
            pointerId: null,
            stickOrigin: new Phaser.Math.Vector2(0, 0),
            stickOffset: new Phaser.Math.Vector2(0, 0),
            desiredVel: new Phaser.Math.Vector2(0, 0),
            gameOver: false,
            snapBack: {
              minSpeed: 130,
              nearSpeed: 86,
              successEnergyCost: 60,
              reversalDot: -0.71,
              nearDot: -0.2,
              reactionWindowMs: 155,
              nearReactionWindowMs: 232,
              cooldownMs: 110,
              minInputPower: 0.58,
              nearMinInputPower: 0.31,
              nearFlipDot: -0.24,
              lastStrongInputDir: new Phaser.Math.Vector2(0, 0),
              lastStrongInputAt: Number.NEGATIVE_INFINITY,
              lastDetectedAt: Number.NEGATIVE_INFINITY,
              lastInputPower: 0,
              lastResult: null,
              lastFeedbackAt: Number.NEGATIVE_INFINITY,
              feedbackCooldownMs: 70,
              history: [],
            },
            xpMagnetBurst: {
              activeUntil: Number.NEGATIVE_INFINITY,
              durationMs: 380,
              radiusMultiplier: 1.95,
              speedMultiplier: 7.5,
              lerpMultiplier: 1.8,
            },
            releaseStabilityPulse: {
              activeUntil: Number.NEGATIVE_INFINITY,
              durationMs: 280,
              instabilityMultiplier: 0.45,
            },
            nearMissMagnetPulse: {
              activeUntil: Number.NEGATIVE_INFINITY,
              durationMs: 160,
              radius: 178,
              maxSpeed: 360,
              lerp: 0.32,
            },
            nearMissBurst: {
              activeUntil: Number.NEGATIVE_INFINITY,
              durationMs: 150,
              speedMultiplier: 1.58,
            },
            nearMissPushback: {
              activeUntil: Number.NEGATIVE_INFINITY,
              durationMs: 160,
              radius: 92,
              speed: 132,
            },
            nearMissStabilityPulse: {
              activeUntil: Number.NEGATIVE_INFINITY,
              durationMs: 180,
              instabilityMultiplier: 0.86,
            },
            spawnDirector: {
              startedAt: 0,
              rampDurationMs: 4 * 60 * 1000,
              baseDelayMs: 900,
              minDelayMs: 340,
              baseEnemyCap: 18,
              maxEnemyCap: 52,
              biasType: null,
              biasUntil: 0,
              nextBiasCheckAt: 0,
            },
            nextEnemyUid: 1,
          };

          this.player = this.physics.add.sprite(WORLD_W / 2, WORLD_H / 2, VISUAL_ASSETS.player.textureKey);
          this.player.setScale(VISUAL_SCALE.player);
          this.player.setCircle(VISUAL_ASSETS.player.hitRadius).setCollideWorldBounds(true);
          this.player.body.setDrag(0);
          this.playerHitRing = this.add.circle(
            this.player.x,
            this.player.y,
            VISUAL_ASSETS.player.hitRadius,
            0x89cdff,
            0.11,
          ).setStrokeStyle(1.5, 0xb7e3ff, 0.34).setDepth(this.player.depth + 1);
          this.playerBaseAlpha = this.player.alpha;
          this.playerBaseScale = this.player.scale;
          this.playerTrailParticles = this.add.particles(0, 0, VISUAL_ASSETS.player.textureKey, {
            lifespan: PLAYER_TRAIL_VISUAL.lifespanSlow,
            quantity: 1,
            frequency: PLAYER_TRAIL_VISUAL.frequencySlow,
            scale: { start: PLAYER_TRAIL_VISUAL.scaleStartSlow, end: PLAYER_TRAIL_VISUAL.scaleEndSlow },
            alpha: { start: PLAYER_TRAIL_VISUAL.alphaSlow, end: 0 },
            speed: { min: 8, max: 30 },
            tint: [0x95ceff, 0xd5ebff],
            blendMode: Phaser.BlendModes.ADD,
            follow: this.player,
            emitting: false,
          }).setDepth(this.player.depth - 1);
          this.xpTrailParticles = this.add.particles(0, 0, VISUAL_ASSETS.xp.textureKey, {
            lifespan: XP_VISUAL.trailLifespanMin,
            quantity: 1,
            scale: { start: XP_VISUAL.trailScaleMin, end: 0.01 },
            alpha: { start: XP_VISUAL.trailAlphaMin, end: 0 },
            speed: { min: XP_VISUAL.trailSpeedMin, max: XP_VISUAL.trailSpeedMax },
            blendMode: Phaser.BlendModes.ADD,
            emitting: false,
          }).setDepth(this.player.depth - 2);
          this.xpPickupParticles = this.add.particles(0, 0, VISUAL_ASSETS.xp.textureKey, {
            lifespan: XP_PICKUP_FEEDBACK.pulseLifespanMs,
            quantity: 1,
            scale: { start: XP_PICKUP_FEEDBACK.pulseScaleStart, end: XP_PICKUP_FEEDBACK.pulseScaleEnd },
            alpha: { start: XP_PICKUP_FEEDBACK.pulseAlphaStart, end: 0 },
            speed: { min: 0, max: 0 },
            blendMode: Phaser.BlendModes.ADD,
            emitting: false,
          }).setDepth(this.player.depth + 2);
          this.lastXpTrailAt = 0;
          this.initSnapAudio();

          this._onGlobalPointerUp = () => this.releasePointer();
          this._onWindowBlur = () => this.releasePointer();
          window.addEventListener('pointerup', this._onGlobalPointerUp);
          window.addEventListener('blur', this._onWindowBlur);
          this.events.once('shutdown', () => {
            window.removeEventListener('pointerup', this._onGlobalPointerUp);
            window.removeEventListener('blur', this._onWindowBlur);
            if (this.instabilityParticleSystem) {
              this.instabilityParticleSystem.destroy();
              this.instabilityParticleSystem = null;
              this.instabilityParticles = null;
            }
            if (this.playerTrailParticles) {
              this.playerTrailParticles.destroy();
              this.playerTrailParticles = null;
            }
            if (this.xpTrailParticles) {
              this.xpTrailParticles.destroy();
              this.xpTrailParticles = null;
            }
            if (this.xpPickupParticles) {
              this.xpPickupParticles.destroy();
              this.xpPickupParticles = null;
            }
            if (this.playerHitRing) {
              this.playerHitRing.destroy();
              this.playerHitRing = null;
            }
            this.activeNearAttack?.hitRect?.destroy();
            this.activeNearAttack?.laserVisual?.destroy();
            this.activeNearAttack = null;
            this.disposeSnapAudio();
          });

          this.bullets = this.physics.add.group({ classType: Phaser.Physics.Arcade.Image, maxSize: 120, runChildUpdate: true });
          this.enemies = this.physics.add.group();
          this.xpOrbs = this.physics.add.group();

          this.physics.add.overlap(this.bullets, this.enemies, this.onBulletHit, null, this);
          this.physics.add.overlap(this.player, this.xpOrbs, this.onXpPickup, null, this);
          this.physics.add.overlap(this.player, this.enemies, this.onEnemyTouch, null, this);

          this.spawnTimer = this.time.addEvent({ delay: 900, loop: true, callback: () => this.spawnEnemy() });
          this.fireTimer = this.time.addEvent({ delay: this.state.fireRate, loop: true, callback: () => this.autoFire() });
          this.state.spawnDirector.startedAt = this.time.now;
          this.state.spawnDirector.nextBiasCheckAt = this.time.now + Phaser.Math.Between(5000, 9000);

          this.input.on('pointerdown', (pointer) => {
            this.handleBuildToggleTap();
            this.resumeSnapAudio();
            if (this.state.pointerId !== null) return;
            this.state.pointerId = pointer.id;
            this.state.stickOrigin.set(pointer.worldX, pointer.worldY);
            this.state.stickOffset.set(0, 0);
            this.state.desiredVel.set(0, 0);
            this.state.snapBack.lastStrongInputAt = Number.NEGATIVE_INFINITY;
            this.state.snapBack.lastDetectedAt = Number.NEGATIVE_INFINITY;
            this.state.snapBack.lastStrongInputDir.set(0, 0);
            this.state.snapBack.lastInputPower = 0;
          });
          this.input.on('pointermove', (pointer) => {
            if (this.state.pointerId === null && pointer.isDown) {
              this.state.pointerId = pointer.id;
              this.state.stickOrigin.set(pointer.worldX, pointer.worldY);
              this.state.stickOffset.set(0, 0);
            }
            if (pointer.id !== this.state.pointerId) return;
            const stickMaxRadius = 132;
            const deadZone = 14;
            let dx = pointer.worldX - this.state.stickOrigin.x;
            let dy = pointer.worldY - this.state.stickOrigin.y;
            const len = Math.hypot(dx, dy);
            if (len > stickMaxRadius) {
              const c = stickMaxRadius / len;
              dx *= c;
              dy *= c;
            }
            this.state.stickOffset.set(dx, dy);
            const mag = Math.hypot(dx, dy);
            const movePower = Phaser.Math.Clamp((mag - deadZone) / (stickMaxRadius - deadZone), 0, 1);
            if (mag <= deadZone) {
              this.state.desiredVel.set(0, 0);
              this.state.snapBack.lastInputPower = 0;
              return;
            }
            const nx = dx / mag;
            const ny = dy / mag;
            this.state.desiredVel.set(nx * this.state.moveSpeed * movePower, ny * this.state.moveSpeed * movePower);
            this.processSnapBackInput(nx, ny, movePower, this.time.now);
          });
          this.input.on('pointerup', (pointer) => {
            if (pointer.id !== this.state.pointerId) return;
            this.releasePointer();
          });

          this.hud = this.add.text(12, 12, '', {
            fontFamily: 'system-ui, sans-serif',
            fontSize: '22px',
            color: '#e6ecff',
            stroke: '#000',
            strokeThickness: 4,
          }).setScrollFactor(0).setDepth(10);

          this.versionText = this.add.text(WORLD_W - 12, 12, `Ver ${BUILD_STAMP}`, {
            fontFamily: 'system-ui, sans-serif',
            fontSize: '18px',
            color: '#a8b4e0',
            stroke: '#000',
            strokeThickness: 3,
          }).setOrigin(1, 0).setScrollFactor(0).setDepth(10);
          this.buildText = this.add.text(10, 42, BUILD_STAMP, {
            fontFamily: 'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace',
            fontSize: '11px',
            color: '#d6ddff',
          }).setOrigin(0, 0).setScrollFactor(0).setDepth(10).setAlpha(0.35);
          this.buildDirectionText = this.add.text(WORLD_W - 10, 40, this.getBuildDirectionLabel(), {
            fontFamily: 'system-ui, sans-serif',
            fontSize: '13px',
            color: '#d6ddff',
          }).setOrigin(1, 0).setScrollFactor(0).setDepth(10).setAlpha(0.4);

          this.message = this.add.text(WORLD_W / 2, WORLD_H / 2, '', {
            fontFamily: 'system-ui, sans-serif',
            fontSize: '32px',
            color: '#fff',
            align: 'center',
            stroke: '#000',
            strokeThickness: 6,
          }).setOrigin(0.5).setDepth(20);

          this.updateHUD();
        }

        getBuildDirectionLabel() {
          return activeBuildDirection === BUILD_DIRECTION.SNAP ? 'SNAP' : 'STABILITY';
        }

        toggleBuildDirection() {
          activeBuildDirection = activeBuildDirection === BUILD_DIRECTION.SNAP
            ? BUILD_DIRECTION.STABILITY
            : BUILD_DIRECTION.SNAP;
          if (this.buildDirectionText) {
            this.buildDirectionText.setText(this.getBuildDirectionLabel());
          }
        }

        handleBuildToggleTap() {
          const now = this.time.now;
          if (now - this.lastTapAt <= DOUBLE_TAP_TOGGLE_WINDOW_MS) {
            this.toggleBuildDirection();
            this.lastTapAt = Number.NEGATIVE_INFINITY;
            return;
          }
          this.lastTapAt = now;
        }

        getEnergyNormalized() {
          return Phaser.Math.Clamp(this.state.energy / 220, 0, 1);
        }

        getSnapReleaseProfile() {
          const energyNorm = this.getEnergyNormalized();
          return {
            energyNorm,
            radius: Phaser.Math.Linear(150, 350, energyNorm),
            intensity: Phaser.Math.Linear(0.65, 1.45, energyNorm),
          };
        }

        getXpMagnetConfig() {
          const buildXpTuning = getActiveBuildTuning().xpAttraction;
          const baseConfig = {
            radius: 150 * buildXpTuning.radiusScale,
            maxSpeed: 165,
            lerp: 0.12,
          };
          if (this.time.now >= this.state.xpMagnetBurst.activeUntil) {
            return baseConfig;
          }
          return {
            radius: baseConfig.radius * this.state.xpMagnetBurst.radiusMultiplier,
            maxSpeed: baseConfig.maxSpeed * this.state.xpMagnetBurst.speedMultiplier,
            lerp: Math.min(1, baseConfig.lerp * this.state.xpMagnetBurst.lerpMultiplier),
          };
        }

        triggerXpMagnetBurst(releaseIntensity = 1) {
          const magnetBurst = this.state.xpMagnetBurst;
          const shortAfterEffectMs = Phaser.Math.Clamp(
            magnetBurst.durationMs * Phaser.Math.Linear(1.06, 1.22, Phaser.Math.Clamp(releaseIntensity - 0.85, 0, 1)),
            magnetBurst.durationMs,
            magnetBurst.durationMs + 90,
          );
          magnetBurst.activeUntil = this.time.now + shortAfterEffectMs;
        }

        triggerReleaseStabilityPulse(releaseIntensity = 1) {
          const stabilityPulse = this.state.releaseStabilityPulse;
          const duration = Phaser.Math.Clamp(
            stabilityPulse.durationMs * Phaser.Math.Linear(0.92, 1.16, Phaser.Math.Clamp(releaseIntensity - 0.85, 0, 1)),
            220,
            360,
          );
          stabilityPulse.activeUntil = this.time.now + duration;
        }

        triggerNearMissMagnetPulse() {
          this.state.nearMissMagnetPulse.activeUntil = this.time.now + this.state.nearMissMagnetPulse.durationMs;
        }

        triggerNearMissBurst(inputDir) {
          const nearMissBurst = this.state.nearMissBurst;
          nearMissBurst.activeUntil = this.time.now + nearMissBurst.durationMs;
          const playerFlash = this.add.circle(
            this.player.x,
            this.player.y,
            30,
            0xb5d2ff,
            0.56,
          ).setDepth(this.player.depth + 1);
          playerFlash.setBlendMode(Phaser.BlendModes.ADD);
          this.tweens.add({
            targets: playerFlash,
            alpha: 0,
            scale: 1.62,
            duration: 92,
            ease: 'Cubic.easeOut',
            onComplete: () => playerFlash.destroy(),
          });

          const burstLen = 58;
          const burstWidth = 12;
          const streak = this.add.rectangle(
            this.player.x + inputDir.x * 22,
            this.player.y + inputDir.y * 22,
            burstLen,
            burstWidth,
            0xc6d9ff,
            0.58,
          ).setDepth(this.player.depth + 2);
          streak.rotation = Math.atan2(inputDir.y, inputDir.x);
          streak.setBlendMode(Phaser.BlendModes.ADD);
          this.tweens.add({
            targets: streak,
            alpha: 0,
            scaleX: 1.32,
            scaleY: 0.66,
            x: streak.x + inputDir.x * 12,
            y: streak.y + inputDir.y * 12,
            duration: 74,
            ease: 'Quad.easeOut',
            onComplete: () => streak.destroy(),
          });

          const flash = this.add.circle(
            this.player.x + inputDir.x * 10,
            this.player.y + inputDir.y * 10,
            16,
            0xb2c9ff,
            0.56,
          ).setDepth(this.player.depth + 2);
          flash.setBlendMode(Phaser.BlendModes.ADD);
          this.tweens.add({
            targets: flash,
            alpha: 0,
            scale: 1.26,
            duration: 80,
            ease: 'Quad.easeOut',
            onComplete: () => flash.destroy(),
          });
        }

        triggerNearMissStabilityPulse() {
          this.state.nearMissStabilityPulse.activeUntil = this.time.now + this.state.nearMissStabilityPulse.durationMs;
        }

        triggerNearMissPushback() {
          const nearMissPushback = this.state.nearMissPushback;
          nearMissPushback.activeUntil = this.time.now + nearMissPushback.durationMs;
        }

        releasePointer() {
          if (this.state.pointerId === null) return;
          this.state.pointerId = null;
          this.state.stickOffset.set(0, 0);
          this.state.desiredVel.set(0, 0);
        }

        buildVisualAssets() {
          const g = this.add.graphics();
          VISUAL_ASSETS.enemies.forEach((enemyVisual) => enemyVisual.generatePlaceholder(g));
          VISUAL_ASSETS.attack.bullet.generatePlaceholder(g);
          VISUAL_ASSETS.xp.generatePlaceholder(g);
          g.clear();
          g.destroy();
        }

        getRandomEnemyVisual() {
          return Phaser.Utils.Array.GetRandom(VISUAL_ASSETS.enemies);
        }

        getEnemySpawnPoint() {
          const edge = Phaser.Math.Between(0, 3);
          let x = 0, y = 0;
          if (edge === 0) { x = Phaser.Math.Between(0, WORLD_W); y = -20; }
          if (edge === 1) { x = WORLD_W + 20; y = Phaser.Math.Between(0, WORLD_H); }
          if (edge === 2) { x = Phaser.Math.Between(0, WORLD_W); y = WORLD_H + 20; }
          if (edge === 3) { x = -20; y = Phaser.Math.Between(0, WORLD_H); }
          return { x, y };
        }

        spawnEnemyWithBehavior(x, y, behaviorType, spawnScatter = 0) {
          const enemyVisual = this.getRandomEnemyVisual();
          let spawnX = x;
          let spawnY = y;
          if (spawnScatter > 0) {
            spawnX += Phaser.Math.Between(-spawnScatter, spawnScatter);
            spawnY += Phaser.Math.Between(-spawnScatter, spawnScatter);
          }
          const enemy = this.enemies.create(spawnX, spawnY, enemyVisual.textureKey);
          enemy.setCircle(enemyVisual.hitRadius);
          enemy.setScale(VISUAL_SCALE.enemy);
          enemy.setTint(0xffffff);

          enemy.behaviorType = behaviorType;
          enemy.uid = this.state.nextEnemyUid;
          this.state.nextEnemyUid += 1;
          enemy.hp = 2 + Math.floor(this.state.level * 0.45);
          enemy.speed = 62 + this.state.level * 7;
          enemy.lastHit = 0;
          enemy.driftPhase = Phaser.Math.FloatBetween(0, Math.PI * 2);
          enemy.driftFrequency = Phaser.Math.FloatBetween(0.006, 0.009);
          enemy.driftStrength = Phaser.Math.Between(0.28, 0.46);

          if (behaviorType === ENEMY_BEHAVIOR_TYPES.SWARM) {
            enemy.hp = Math.max(1, enemy.hp - 1);
            enemy.speed *= 0.9;
            enemy.setScale(VISUAL_SCALE.enemySwarm);
            enemy.setTint(0xffd7a3);
            enemy.body.setCircle(Math.max(5, enemyVisual.hitRadius * 0.72));
          } else if (behaviorType === ENEMY_BEHAVIOR_TYPES.DRIFTER) {
            enemy.speed *= 0.95;
            enemy.setTint(0xb1f1ff);
          }
        }

        getSpawnProgress(now = this.time.now) {
          const spawnDirector = this.state.spawnDirector;
          const elapsedMs = Math.max(0, now - spawnDirector.startedAt);
          return Phaser.Math.Clamp(elapsedMs / spawnDirector.rampDurationMs, 0, 1);
        }

        getEnemyCap(spawnProgress) {
          const spawnDirector = this.state.spawnDirector;
          return Math.round(Phaser.Math.Linear(spawnDirector.baseEnemyCap, spawnDirector.maxEnemyCap, spawnProgress));
        }

        updateSpawnDirector(now = this.time.now) {
          const spawnDirector = this.state.spawnDirector;
          const spawnProgress = this.getSpawnProgress(now);
          const activeEnemies = this.enemies.countActive(true);
          const enemyCap = this.getEnemyCap(spawnProgress);

          const capPressure = Phaser.Math.Clamp(activeEnemies / Math.max(1, enemyCap), 0, 1);
          const tensionRelief = Phaser.Math.Linear(1, 1.3, capPressure * capPressure);
          const targetDelay = Phaser.Math.Linear(
            spawnDirector.baseDelayMs,
            spawnDirector.minDelayMs,
            Math.pow(spawnProgress, 1.15),
          ) * tensionRelief;
          this.spawnTimer.delay = Math.round(targetDelay);

          if (now >= spawnDirector.nextBiasCheckAt) {
            const shouldBias = Math.random() < Phaser.Math.Linear(0.2, 0.55, spawnProgress);
            if (shouldBias) {
              spawnDirector.biasType = Math.random() < 0.65
                ? ENEMY_BEHAVIOR_TYPES.SWARM
                : ENEMY_BEHAVIOR_TYPES.DRIFTER;
              spawnDirector.biasUntil = now + Phaser.Math.Between(4500, 8200);
            } else {
              spawnDirector.biasType = null;
              spawnDirector.biasUntil = now;
            }
            spawnDirector.nextBiasCheckAt = now + Phaser.Math.Between(7000, 13000);
          }

          if (spawnDirector.biasType && now >= spawnDirector.biasUntil) {
            spawnDirector.biasType = null;
          }
        }

        chooseEnemyBehaviorType(spawnProgress) {
          const spawnDirector = this.state.spawnDirector;
          const behaviorWeights = {
            [ENEMY_BEHAVIOR_TYPES.CHASER]: Phaser.Math.Linear(0.5, 0.42, spawnProgress),
            [ENEMY_BEHAVIOR_TYPES.SWARM]: Phaser.Math.Linear(0.32, 0.38, spawnProgress),
            [ENEMY_BEHAVIOR_TYPES.DRIFTER]: Phaser.Math.Linear(0.18, 0.2, spawnProgress),
          };

          if (spawnDirector.biasType && this.time.now < spawnDirector.biasUntil) {
            const biasStrength = Phaser.Math.Linear(0.18, 0.34, spawnProgress);
            behaviorWeights[spawnDirector.biasType] += biasStrength;
            behaviorWeights[ENEMY_BEHAVIOR_TYPES.CHASER] = Math.max(
              0.06,
              behaviorWeights[ENEMY_BEHAVIOR_TYPES.CHASER] - biasStrength * 0.68,
            );
          }

          const totalWeight = Object.values(behaviorWeights).reduce((acc, weight) => acc + weight, 0);
          let roll = Math.random() * totalWeight;
          if (roll < behaviorWeights[ENEMY_BEHAVIOR_TYPES.DRIFTER]) return ENEMY_BEHAVIOR_TYPES.DRIFTER;
          roll -= behaviorWeights[ENEMY_BEHAVIOR_TYPES.DRIFTER];
          if (roll < behaviorWeights[ENEMY_BEHAVIOR_TYPES.SWARM]) return ENEMY_BEHAVIOR_TYPES.SWARM;
          return ENEMY_BEHAVIOR_TYPES.CHASER;
        }

        spawnEnemy() {
          if (this.state.gameOver) return;

          const now = this.time.now;
          const spawnProgress = this.getSpawnProgress(now);
          const activeEnemies = this.enemies.countActive(true);
          const enemyCap = this.getEnemyCap(spawnProgress);
          if (activeEnemies >= enemyCap) return;

          const extraWaveChance = Phaser.Math.Linear(0.16, 0.58, spawnProgress);
          const bonusWaveChance = Phaser.Math.Linear(0.02, 0.22, spawnProgress);
          let spawnWaves = 1;
          if (Math.random() < extraWaveChance) spawnWaves += 1;
          if (Math.random() < bonusWaveChance) spawnWaves += 1;

          for (let waveIndex = 0; waveIndex < spawnWaves; waveIndex += 1) {
            if (this.enemies.countActive(true) >= enemyCap) break;
            const { x, y } = this.getEnemySpawnPoint();
            const behaviorType = this.chooseEnemyBehaviorType(spawnProgress);
            if (behaviorType === ENEMY_BEHAVIOR_TYPES.SWARM) {
              const maxSwarmCount = Math.round(Phaser.Math.Linear(5, 8, spawnProgress));
              const swarmCount = Phaser.Math.Between(3, maxSwarmCount);
              for (let i = 0; i < swarmCount; i += 1) {
                if (this.enemies.countActive(true) >= enemyCap) break;
                this.spawnEnemyWithBehavior(x, y, ENEMY_BEHAVIOR_TYPES.SWARM, 20);
              }
              continue;
            }
            this.spawnEnemyWithBehavior(x, y, behaviorType);
          }
        }

        autoFire() {
          if (this.state.gameOver) return;
          const target = this.getNearestEnemy();
          if (!target) return;
          const bulletVisual = VISUAL_ASSETS.attack.bullet;
          const bullet = this.bullets.get(this.player.x, this.player.y, bulletVisual.textureKey);
          if (!bullet) return;

          bullet.setActive(true).setVisible(true);
          bullet.setScale(VISUAL_SCALE.bullet);
          bullet.body.enable = true;
          bullet.setAlpha(1);
          bullet.setBlendMode(Phaser.BlendModes.NORMAL);
          bullet.body.setCircle(bulletVisual.hitRadius);
          bullet.hitEnemyUids = null;

          const angle = Phaser.Math.Angle.Between(this.player.x, this.player.y, target.x, target.y);
          const speed = 480;
          bullet.setVelocity(Math.cos(angle) * speed, Math.sin(angle) * speed);
          bullet.setRotation(angle);
          bullet.lifespan = 700;
        }

        onBulletHit(bullet, enemy) {
          bullet.disableBody(true, true);
          enemy.hp -= 1;
          if (enemy.hp > 0) return;
          this.addEnergyFromKill(enemy);
          this.spawnXp(enemy.x, enemy.y);
          enemy.destroy();
        }

        getNearAttackTransform(nearEvent) {
          const visual = NEAR_ATTACK_VISUAL;
          const halfLength = visual.length * 0.5;
          return {
            length: visual.length,
            width: visual.width,
            angle: nearEvent.angle,
            centerX: nearEvent.originX + nearEvent.dirX * halfLength,
            centerY: nearEvent.originY + nearEvent.dirY * halfLength,
          };
        }

        applyNearAttackTransform(gameObject, nearEvent) {
          const transform = this.getNearAttackTransform(nearEvent);
          gameObject.setPosition(transform.centerX, transform.centerY);
          gameObject.setRotation(transform.angle);
        }

        emitNearAttackRectangle(nearEvent) {
          const visual = NEAR_ATTACK_VISUAL;
          const hitRect = this.add.rectangle(0, 0, visual.length, visual.width, 0xffffff, 1)
            .setDepth(this.player.depth + 4);
          hitRect.setOrigin(0.5, 0.5);
          hitRect.setFillStyle(0xffffff, 0);
          if (DEBUG_NEAR_ATTACK_HITBOX) {
            hitRect.setStrokeStyle(3, 0xff2bd6, 0.98);
          }
          this.applyNearAttackTransform(hitRect, nearEvent);
          return hitRect;
        }

        emitNearAttackLaserVisual(nearEvent) {
          const visual = NEAR_ATTACK_VISUAL;
          const laserRect = this.add.rectangle(0, 0, visual.length, visual.width, visual.color, visual.alpha)
            .setDepth(this.player.depth + 3);
          laserRect.setOrigin(0.5, 0.5);
          laserRect.setStrokeStyle(visual.edgeWidth, visual.edgeColor, visual.edgeAlpha);
          laserRect.setFillStyle(visual.color, visual.alpha);
          laserRect.setBlendMode(Phaser.BlendModes.ADD);
          this.applyNearAttackTransform(laserRect, nearEvent);
          return laserRect;
        }

        getNearAttackDirection(preferredInputDir) {
          if (preferredInputDir && (preferredInputDir.x !== 0 || preferredInputDir.y !== 0)) {
            const len = Math.hypot(preferredInputDir.x, preferredInputDir.y);
            if (len > 0.0001) {
              return new Phaser.Math.Vector2(preferredInputDir.x / len, preferredInputDir.y / len);
            }
          }
          const vx = this.player.body.velocity.x;
          const vy = this.player.body.velocity.y;
          const speed = Math.hypot(vx, vy);
          if (speed > 0.0001) {
            return new Phaser.Math.Vector2(vx / speed, vy / speed);
          }
          return new Phaser.Math.Vector2(0, -1);
        }

        getNearAttackTrackingDirection() {
          const desiredSpeed = this.state.desiredVel.length();
          if (desiredSpeed > NEAR_ATTACK_VISUAL.minSteerSpeed) {
            return new Phaser.Math.Vector2(
              this.state.desiredVel.x / desiredSpeed,
              this.state.desiredVel.y / desiredSpeed,
            );
          }
          const vx = this.player.body.velocity.x;
          const vy = this.player.body.velocity.y;
          const speed = Math.hypot(vx, vy);
          if (speed > NEAR_ATTACK_VISUAL.minSteerSpeed) {
            return new Phaser.Math.Vector2(vx / speed, vy / speed);
          }
          return null;
        }

        updateNearAttack(now) {
          const attack = this.activeNearAttack;
          if (!attack) return;
          if (now >= attack.endAt) {
            attack.hitRect?.destroy();
            attack.laserVisual?.destroy();
            this.activeNearAttack = null;
            return;
          }

          if (now < attack.steerEndAt) {
            const targetDir = this.getNearAttackTrackingDirection();
            if (targetDir) {
              const targetAngle = Math.atan2(targetDir.y, targetDir.x);
              const elapsed = now - attack.startedAt;
              const followWeight = Phaser.Math.Clamp(
                1 - (elapsed / Math.max(1, NEAR_ATTACK_VISUAL.steerDurationMs)),
                0,
                1,
              );
              const delta = Phaser.Math.Angle.Wrap(targetAngle - attack.angle);
              const steerStep = Phaser.Math.Clamp(
                delta * NEAR_ATTACK_VISUAL.steerLerp * followWeight,
                -NEAR_ATTACK_VISUAL.maxSteerStepRad,
                NEAR_ATTACK_VISUAL.maxSteerStepRad,
              );
              attack.angle = Phaser.Math.Angle.Wrap(
                attack.angle + steerStep,
              );
              attack.dirX = Math.cos(attack.angle);
              attack.dirY = Math.sin(attack.angle);
            }
          }

          if (attack.hitRect) this.applyNearAttackTransform(attack.hitRect, attack);
          if (attack.laserVisual) this.applyNearAttackTransform(attack.laserVisual, attack);
          this.applyNearAttackDamage(attack);
        }

        applyNearAttackDamage(attack) {
          const damage = NEAR_ATTACK_PROFILE.damage;
          const transform = this.getNearAttackTransform(attack);
          const hitTuning = NEAR_ATTACK_HIT_TUNING;
          const halfLength = (transform.length * 0.5) + hitTuning.lengthPadding;
          const halfWidth = (transform.width * 0.5) + hitTuning.widthPadding;
          const cos = Math.cos(transform.angle);
          const sin = Math.sin(transform.angle);

          this.enemies.getChildren().forEach((enemy) => {
            if (!enemy.active) return;
            if (attack.hitEnemyUids.has(enemy.uid)) return;
            const enemyCenterX = enemy.body?.center?.x ?? enemy.x;
            const enemyCenterY = enemy.body?.center?.y ?? enemy.y;
            const dx = enemyCenterX - transform.centerX;
            const dy = enemyCenterY - transform.centerY;
            const localX = (dx * cos) + (dy * sin);
            const localY = (-dx * sin) + (dy * cos);
            const enemyRadius = enemy.body?.halfWidth ?? ((enemy.displayWidth || enemy.width || 0) * 0.5);
            const enemyAllowance = Phaser.Math.Clamp(
              enemyRadius * hitTuning.enemyRadiusScale,
              hitTuning.enemyRadiusMin,
              hitTuning.enemyRadiusMax,
            );
            if (Math.abs(localX) > halfLength + enemyAllowance || Math.abs(localY) > halfWidth + enemyAllowance) return;

            attack.hitEnemyUids.add(enemy.uid);
            if (DEBUG_NEAR_ATTACK_HITBOX) {
              enemy.nearAttackHitUntil = this.time.now + hitTuning.debugHitFlashMs;
              enemy.nearAttackHitStrength = 1;
            }
            enemy.hp -= damage;
            if (enemy.hp > 0) return;
            this.addEnergyFromKill(enemy);
            this.spawnXp(enemy.x, enemy.y);
            enemy.destroy();
          });
        }

        triggerNearAttack(inputDir) {
          const dir = this.getNearAttackDirection(inputDir);
          this.activeNearAttack?.hitRect?.destroy();
          this.activeNearAttack?.laserVisual?.destroy();
          const nearEvent = {
            originX: this.player.x,
            originY: this.player.y,
            dirX: dir.x,
            dirY: dir.y,
            angle: Math.atan2(dir.y, dir.x),
          };
          nearEvent.hitRect = this.emitNearAttackRectangle(nearEvent);
          nearEvent.laserVisual = this.emitNearAttackLaserVisual(nearEvent);
          nearEvent.startedAt = this.time.now;
          nearEvent.endAt = nearEvent.startedAt + NEAR_ATTACK_VISUAL.durationMs;
          nearEvent.steerEndAt = nearEvent.startedAt + NEAR_ATTACK_VISUAL.steerDurationMs;
          nearEvent.hitEnemyUids = new Set();
          this.activeNearAttack = nearEvent;
          this.applyNearAttackDamage(nearEvent);
        }

        addEnergyFromKill(enemy) {
          this.state.energy += Math.max(1, Math.floor(enemy.speed / 40));
        }

        getInstabilityStrength() {
          const normalized = this.getEnergyNormalized();
          let instability = normalized * normalized;
          const stabilityPulse = this.state.releaseStabilityPulse;
          if (this.time.now < stabilityPulse.activeUntil) {
            instability *= stabilityPulse.instabilityMultiplier;
          }
          const nearMissStabilityPulse = this.state.nearMissStabilityPulse;
          if (this.time.now < nearMissStabilityPulse.activeUntil) {
            instability *= nearMissStabilityPulse.instabilityMultiplier;
          }
          return instability;
        }

        getEnergyRiskProfile() {
          const instability = this.getInstabilityStrength();
          return {
            instability,
            movementDeviationMaxRad: Phaser.Math.Linear(0, 0.1, instability),
            movementJitterSpeed: Phaser.Math.Linear(0, 22, instability),
            enemyPressureMultiplier: Phaser.Math.Linear(1, 1.12, instability),
            accidentalSnapChancePerSecond: Phaser.Math.Linear(0, 0.1, instability),
          };
        }

        spawnXp(x, y) {
          const orb = this.xpOrbs.create(x, y, VISUAL_ASSETS.xp.textureKey);
          orb.setScale(VISUAL_SCALE.xp);
          orb.setCircle(VISUAL_ASSETS.xp.hitRadius);
          orb.setVelocity(0, 0);
          orb.setBlendMode(Phaser.BlendModes.ADD);
          orb.baseScale = VISUAL_SCALE.xp;
          orb.idlePhase = Phaser.Math.FloatBetween(0, Math.PI * 2);
          orb.driftPhase = Phaser.Math.FloatBetween(0, Math.PI * 2);
          orb.value = 1;
        }

        onXpPickup(player, orb) {
          this.collectXpOrb(orb);
        }

        collectXpOrb(orb) {
          if (!orb || !orb.active) return;
          this.triggerXpPickupFeedback(orb.x, orb.y);
          orb.destroy();
          this.state.xp += orb.value;
          while (this.state.xp >= this.state.xpToNext) {
            this.state.xp -= this.state.xpToNext;
            this.state.level += 1;
            this.state.xpToNext = Math.floor(this.state.xpToNext * 1.28);
            this.state.fireRate = Math.max(140, this.state.fireRate - 8);
            this.fireTimer.reset({ delay: this.state.fireRate, loop: true, callback: () => this.autoFire() });
          }
          this.updateHUD();
        }

        triggerXpPickupFeedback(x, y) {
          if (this.xpPickupParticles) {
            this.xpPickupParticles.emitParticleAt(x, y, 1);
          }
        }

        initSnapAudio() {
          this.snapAudioCtx = null;
          this.snapAudioLastAt = Number.NEGATIVE_INFINITY;
          this.snapNoiseBuffer = null;
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtx) return;
          try {
            this.snapAudioCtx = new AudioCtx({ sampleRate: SNAP_AUDIO.sampleRate, latencyHint: 'interactive' });
            this.snapNoiseBuffer = this.createSnapNoiseBuffer(this.snapAudioCtx);
          } catch (err) {
            this.snapAudioCtx = null;
            this.snapNoiseBuffer = null;
          }
        }

        resumeSnapAudio() {
          if (!this.snapAudioCtx || this.snapAudioCtx.state !== 'suspended') return;
          this.snapAudioCtx.resume().catch(() => {});
        }

        createSnapNoiseBuffer(ctx) {
          const frameCount = Math.max(1, Math.floor(ctx.sampleRate * 0.2));
          const buffer = ctx.createBuffer(1, frameCount, ctx.sampleRate);
          const channel = buffer.getChannelData(0);
          for (let i = 0; i < frameCount; i += 1) {
            channel[i] = Math.random() * 2 - 1;
          }
          return buffer;
        }

        playSnapSuccessSound() {
          if (!this.snapAudioCtx || this.snapAudioCtx.state !== 'running' || !this.snapNoiseBuffer) return;
          if (this.time.now - this.snapAudioLastAt < SNAP_AUDIO.minIntervalMs) return;
          this.snapAudioLastAt = this.time.now;
          const ctx = this.snapAudioCtx;
          const now = ctx.currentTime;
          const pullEnd = now + SNAP_AUDIO.pullSec;
          const burstEnd = pullEnd + SNAP_AUDIO.burstSec;
          const end = now + SNAP_AUDIO.durationSec;
          const out = ctx.createGain();
          const source = ctx.createBufferSource();
          const stage = ctx.createGain();
          const burstGain = ctx.createGain();
          const bodyFilter = ctx.createBiquadFilter();
          const airFilter = ctx.createBiquadFilter();
          const tailFilter = ctx.createBiquadFilter();

          source.buffer = this.snapNoiseBuffer;
          source.playbackRate.setValueAtTime(1.22, now);
          source.playbackRate.exponentialRampToValueAtTime(0.82, end);

          out.gain.setValueAtTime(SNAP_AUDIO.peakVolume, now);
          out.gain.exponentialRampToValueAtTime(0.0001, end);

          stage.gain.setValueAtTime(0.0001, now);
          stage.gain.exponentialRampToValueAtTime(0.32, pullEnd);
          stage.gain.linearRampToValueAtTime(1.0, burstEnd);
          stage.gain.exponentialRampToValueAtTime(0.0001, end);

          burstGain.gain.setValueAtTime(0.82, now);
          burstGain.gain.linearRampToValueAtTime(0.9, pullEnd);
          burstGain.gain.exponentialRampToValueAtTime(1.35, pullEnd + 0.01);
          burstGain.gain.exponentialRampToValueAtTime(0.48, burstEnd);
          burstGain.gain.exponentialRampToValueAtTime(0.14, end);

          bodyFilter.type = 'bandpass';
          bodyFilter.frequency.setValueAtTime(640, now);
          bodyFilter.frequency.exponentialRampToValueAtTime(1480, pullEnd);
          bodyFilter.frequency.exponentialRampToValueAtTime(760, end);
          bodyFilter.Q.setValueAtTime(1.35, now);
          bodyFilter.Q.linearRampToValueAtTime(0.7, end);

          airFilter.type = 'highpass';
          airFilter.frequency.setValueAtTime(240, now);
          airFilter.frequency.exponentialRampToValueAtTime(560, burstEnd);
          airFilter.frequency.exponentialRampToValueAtTime(320, end);
          airFilter.Q.setValueAtTime(0.45, now);

          tailFilter.type = 'lowpass';
          tailFilter.frequency.setValueAtTime(4200, now);
          tailFilter.frequency.exponentialRampToValueAtTime(2100, burstEnd);
          tailFilter.frequency.exponentialRampToValueAtTime(980, end);
          tailFilter.Q.setValueAtTime(0.62, now);

          source.connect(stage);
          stage.connect(burstGain);
          burstGain.connect(bodyFilter);
          bodyFilter.connect(airFilter);
          airFilter.connect(tailFilter);
          tailFilter.connect(out);
          out.connect(ctx.destination);

          source.start(now);
          source.stop(end + 0.02);
          source.onended = () => {
            source.disconnect();
            stage.disconnect();
            burstGain.disconnect();
            bodyFilter.disconnect();
            airFilter.disconnect();
            tailFilter.disconnect();
            out.disconnect();
          };
        }

        disposeSnapAudio() {
          if (this.snapAudioCtx) {
            this.snapAudioCtx.close().catch(() => {});
          }
          this.snapAudioCtx = null;
          this.snapNoiseBuffer = null;
        }

        collectXpWithinRadius(cx, cy, radius) {
          const radiusSq = radius * radius;
          const collected = [];
          this.xpOrbs.getChildren().forEach((orb) => {
            if (!orb.active) return;
            const distSq = Phaser.Math.Distance.Squared(cx, cy, orb.x, orb.y);
            if (distSq <= radiusSq) {
              collected.push(orb);
            }
          });
          collected.forEach((orb) => this.collectXpOrb(orb));
        }

        onEnemyTouch(player, enemy) {
          if (this.state.gameOver) return;
          const now = this.time.now;
          if (now - enemy.lastHit < 450) return;
          enemy.lastHit = now;
          this.state.hp = Math.max(0, this.state.hp - 8);
          this.updateHUD();
          if (this.state.hp === 0) this.gameOver();
        }

        getNearestEnemy() {
          let best = null;
          let bestDist = Infinity;
          this.enemies.getChildren().forEach((enemy) => {
            const d = Phaser.Math.Distance.Squared(this.player.x, this.player.y, enemy.x, enemy.y);
            if (d < bestDist) {
              best = enemy;
              bestDist = d;
            }
          });
          return best;
        }

        updateHUD() {
          this.hud.setText(`HP ${this.state.hp}   LV ${this.state.level}   XP ${this.state.xp}/${this.state.xpToNext}`);
        }

        evaluateSnapBack(inputDir, now) {
          const snapBackState = this.state.snapBack;
          const vx = this.player.body.velocity.x;
          const vy = this.player.body.velocity.y;
          const speed = Math.hypot(vx, vy);
          const movementDir = speed > 0 ? new Phaser.Math.Vector2(vx / speed, vy / speed) : new Phaser.Math.Vector2(0, 0);
          const reversalDot = speed > 0 ? movementDir.dot(inputDir) : 1;
          const flipDot = snapBackState.lastStrongInputDir.dot(inputDir);
          const reactionMs = now - snapBackState.lastStrongInputAt;
          const reversedInput = flipDot <= snapBackState.reversalDot;
          const withinWindow = reactionMs <= snapBackState.reactionWindowMs;
          const quickReverseInput = reversedInput && withinWindow;
          const inputPowerStrongEnough = snapBackState.lastInputPower >= snapBackState.minInputPower;
          const onCooldown = now - snapBackState.lastDetectedAt < snapBackState.cooldownMs;

          let outcome = SNAP_BACK_RESULT.FAIL;
          if (!onCooldown && speed >= snapBackState.minSpeed && reversalDot <= snapBackState.reversalDot && quickReverseInput && inputPowerStrongEnough) {
            outcome = SNAP_BACK_RESULT.SUCCESS_CANDIDATE;
            snapBackState.lastDetectedAt = now;
          } else {
            const nearSpeedOk = speed >= snapBackState.nearSpeed;
            const nearReverseOk = reversalDot <= snapBackState.nearDot;
            const nearFlipOk = flipDot <= snapBackState.nearFlipDot;
            const nearWindowOk = reactionMs <= snapBackState.nearReactionWindowMs;
            const nearInputPowerOk = snapBackState.lastInputPower >= snapBackState.nearMinInputPower;
            if (nearSpeedOk && nearReverseOk && nearFlipOk && nearWindowOk && nearInputPowerOk) {
              outcome = SNAP_BACK_RESULT.NEAR_MISS;
            }
          }

          const result = {
            outcome,
            at: now,
            speed,
            reversalDot,
            inputFlipDot: flipDot,
            elapsedSincePrevInput: reactionMs,
            quickReverseInput,
            onCooldown,
            inputPower: snapBackState.lastInputPower,
          };
          snapBackState.lastResult = result;
          snapBackState.history.push(result);
          if (snapBackState.history.length > 24) {
            snapBackState.history.shift();
          }
          if (result.outcome === SNAP_BACK_RESULT.SUCCESS_CANDIDATE) {
            this.triggerSnapBackRelease();
          } else if (result.outcome === SNAP_BACK_RESULT.NEAR_MISS) {
            this.triggerNearAttack(inputDir);
            this.triggerNearMissMagnetPulse();
            this.triggerNearMissBurst(inputDir);
            this.triggerNearMissPushback();
            this.triggerNearMissStabilityPulse();
          }
          this.showSnapBackDebugFlash(result.outcome, inputDir, now);
        }

        triggerSnapBackRelease() {
          if (this.state.gameOver) return;
          const releaseProfile = this.getSnapReleaseProfile();
          const releaseRadius = releaseProfile.radius;
          const releaseRadiusSq = releaseRadius * releaseRadius;
          const enemiesToClear = [];
          this.enemies.getChildren().forEach((enemy) => {
            const distSq = Phaser.Math.Distance.Squared(this.player.x, this.player.y, enemy.x, enemy.y);
            if (distSq <= releaseRadiusSq) {
              enemiesToClear.push(enemy);
            }
          });

          enemiesToClear.forEach((enemy) => {
            this.spawnXp(enemy.x, enemy.y);
            enemy.destroy();
          });
          this.state.energy = Math.max(0, this.state.energy - this.state.snapBack.successEnergyCost);
          this.triggerXpMagnetBurst(releaseProfile.intensity);
          this.triggerReleaseStabilityPulse(releaseProfile.intensity);
          this.playSnapSuccessSound();

          const burst = this.add.circle(this.player.x, this.player.y, 28, 0xb8ffff, 0.45).setDepth(this.player.depth + 1);
          burst.setBlendMode(Phaser.BlendModes.ADD);
          this.tweens.add({
            targets: burst,
            scale: releaseRadius / 28,
            alpha: 0,
            duration: Math.round(Phaser.Math.Linear(180, 260, releaseProfile.energyNorm)),
            ease: 'Cubic.easeOut',
            onComplete: () => burst.destroy(),
          });
          this.emitSnapRipple(this.player.x, this.player.y, 0xb7ffff, Phaser.Math.Clamp(releaseProfile.energyNorm, 0.35, 1));
        }

        emitSnapRipple(x, y, color, intensity = 1) {
          const rippleTuning = getActiveBuildTuning().snapRipple;
          const tunedIntensity = Phaser.Math.Clamp(intensity, 0, 1);
          const inner = this.add.circle(x, y, 10, color, 0).setDepth(this.player.depth + 2);
          inner.setStrokeStyle(
            Phaser.Math.Linear(2.4, 4, tunedIntensity) * rippleTuning.strokeScale,
            color,
            Phaser.Math.Clamp(Phaser.Math.Linear(0.75, 0.95, tunedIntensity) * rippleTuning.alphaScale, 0, 1),
          );
          inner.setBlendMode(Phaser.BlendModes.ADD);
          const outer = this.add.circle(x, y, 16, color, 0).setDepth(this.player.depth + 1);
          outer.setStrokeStyle(
            Phaser.Math.Linear(1.6, 2.8, tunedIntensity) * rippleTuning.strokeScale,
            color,
            Phaser.Math.Clamp(Phaser.Math.Linear(0.4, 0.6, tunedIntensity) * rippleTuning.alphaScale, 0, 1),
          );
          outer.setBlendMode(Phaser.BlendModes.ADD);

          this.tweens.add({
            targets: inner,
            scale: Phaser.Math.Linear(2.2, 3.1, tunedIntensity),
            alpha: 0,
            duration: Phaser.Math.Linear(90, 130, tunedIntensity) * rippleTuning.durationScale,
            ease: 'Cubic.easeOut',
            onUpdate: () => {
              const t = Phaser.Math.Clamp((inner.scaleX - 1) / Math.max(0.0001, Phaser.Math.Linear(1.2, 2.1, tunedIntensity)), 0, 1);
              inner.setStrokeStyle(
                Phaser.Math.Linear(Phaser.Math.Linear(2.4, 4, tunedIntensity) * rippleTuning.strokeScale, 0, t),
                color,
                Phaser.Math.Linear(
                  Phaser.Math.Clamp(Phaser.Math.Linear(0.75, 0.95, tunedIntensity) * rippleTuning.alphaScale, 0, 1),
                  0,
                  t,
                ),
              );
            },
            onComplete: () => inner.destroy(),
          });
          this.tweens.add({
            targets: outer,
            scale: Phaser.Math.Linear(1.7, 2.4, tunedIntensity),
            alpha: 0,
            duration: Phaser.Math.Linear(110, 150, tunedIntensity) * rippleTuning.durationScale,
            ease: 'Quad.easeOut',
            onUpdate: () => {
              const t = Phaser.Math.Clamp((outer.scaleX - 1) / Math.max(0.0001, Phaser.Math.Linear(0.7, 1.4, tunedIntensity)), 0, 1);
              outer.setStrokeStyle(
                Phaser.Math.Linear(Phaser.Math.Linear(1.6, 2.8, tunedIntensity) * rippleTuning.strokeScale, 0, t),
                color,
                Phaser.Math.Linear(
                  Phaser.Math.Clamp(Phaser.Math.Linear(0.4, 0.6, tunedIntensity) * rippleTuning.alphaScale, 0, 1),
                  0,
                  t,
                ),
              );
            },
            onComplete: () => outer.destroy(),
          });
        }

        showSnapBackDebugFlash(outcome, inputDir, now) {
          const snapBackState = this.state.snapBack;
          if (now - snapBackState.lastFeedbackAt < snapBackState.feedbackCooldownMs) return;
          snapBackState.lastFeedbackAt = now;
          if (outcome === SNAP_BACK_RESULT.FAIL) {
            const failFlash = this.add.circle(
              this.player.x + inputDir.x * 8,
              this.player.y + inputDir.y * 8,
              6,
              0x6f7f9f,
              0.12,
            ).setDepth(this.player.depth + 1);
            this.tweens.add({
              targets: failFlash,
              alpha: 0,
              scale: 1.12,
              duration: 60,
              ease: 'Quad.easeOut',
              onComplete: () => failFlash.destroy(),
            });
            return;
          }

          const isSuccess = outcome === SNAP_BACK_RESULT.SUCCESS_CANDIDATE;
          const color = isSuccess ? 0x8ffcff : 0x8ea9ff;
          const radius = isSuccess ? 38 : 19;
          const alpha = isSuccess ? 0.55 : 0.36;
          const offset = isSuccess ? 22 : 16;
          const duration = isSuccess ? 150 : 95;

          const flash = this.add.circle(
            this.player.x + inputDir.x * offset,
            this.player.y + inputDir.y * offset,
            radius,
            color,
            alpha,
          ).setDepth(this.player.depth + 1);
          flash.setBlendMode(Phaser.BlendModes.ADD);

          this.tweens.add({
            targets: flash,
            alpha: 0,
            scale: isSuccess ? 1.3 : 1.06,
            duration,
            ease: 'Quad.easeOut',
            onComplete: () => flash.destroy(),
          });

          if (isSuccess) {
            this.emitSnapRipple(
              this.player.x + inputDir.x * 18,
              this.player.y + inputDir.y * 18,
              0xb8ffff,
              0.75,
            );
            const ring = this.add.circle(
              this.player.x + inputDir.x * 24,
              this.player.y + inputDir.y * 24,
              18,
              color,
              0,
            ).setDepth(this.player.depth + 2);
            ring.setStrokeStyle(4, 0xb8ffff, 0.95);
            ring.setBlendMode(Phaser.BlendModes.ADD);
            this.tweens.add({
              targets: ring,
              scale: 1.95,
              alpha: 0,
              duration: 160,
              ease: 'Cubic.easeOut',
              onUpdate: () => {
                ring.setStrokeStyle(Phaser.Math.Linear(4, 0, ring.scaleX - 1), 0xb8ffff, Phaser.Math.Linear(0.95, 0, ring.scaleX - 1));
              },
              onComplete: () => ring.destroy(),
            });
          } else {
            return;
          }

          const label = this.add.text(
            this.player.x + inputDir.x * 34,
            this.player.y + inputDir.y * 34,
            isSuccess ? 'SNAP' : 'NEAR',
            {
              fontFamily: 'system-ui, sans-serif',
              fontSize: isSuccess ? '24px' : '21px',
              fontStyle: '700',
              color: isSuccess ? '#58fff0' : '#ffe27a',
              stroke: '#000',
              strokeThickness: 5,
            },
          ).setOrigin(0.5).setDepth(this.player.depth + 3);
          label.setAlpha(isSuccess ? 1 : 0.95);

          this.tweens.add({
            targets: label,
            y: label.y - 12,
            alpha: 0,
            duration: isSuccess ? 260 : 180,
            ease: 'Quad.easeOut',
            onComplete: () => label.destroy(),
          });
        }

        processSnapBackInput(nx, ny, movePower, now) {
          const snapBackState = this.state.snapBack;
          const inputDir = new Phaser.Math.Vector2(nx, ny);
          snapBackState.lastInputPower = movePower;
          if (movePower < snapBackState.nearMinInputPower) return;
          if (Number.isFinite(snapBackState.lastStrongInputAt)) {
            this.evaluateSnapBack(inputDir, now);
          }
          if (movePower < snapBackState.minInputPower) return;
          snapBackState.lastStrongInputDir.copy(inputDir);
          snapBackState.lastStrongInputAt = now;
        }

        tryAccidentalSnap(dt, riskProfile) {
          if (this.state.gameOver) return;
          if (this.state.pointerId === null) return;
          if (!Number.isFinite(this.state.snapBack.lastStrongInputAt)) return;
          if (riskProfile.accidentalSnapChancePerSecond <= 0) return;
          const chanceThisFrame = riskProfile.accidentalSnapChancePerSecond * (dt / 1000);
          if (Math.random() >= chanceThisFrame) return;
          // SNAP is input-gated; accidental rolls never auto-trigger a release.
        }

        gameOver() {
          this.state.gameOver = true;
          this.message.setText('DEFEATED\nAuto-restarting...');
          this.time.delayedCall(1200, () => this.scene.restart());
        }

        update(_, dt) {
          if (!this.player || this.state.gameOver) return;
          this.updateSpawnDirector(this.time.now);
          const riskProfile = this.getEnergyRiskProfile();
          const desiredSpeed = this.state.desiredVel.length();
          let desiredDirX = desiredSpeed > 0 ? this.state.desiredVel.x / desiredSpeed : 0;
          let desiredDirY = desiredSpeed > 0 ? this.state.desiredVel.y / desiredSpeed : 0;
          let targetVelX = this.state.desiredVel.x;
          let targetVelY = this.state.desiredVel.y;
          const nearMissBurst = this.state.nearMissBurst;
          const hasNearMissBurst = this.time.now < nearMissBurst.activeUntil;
          if (desiredSpeed > 0 && hasNearMissBurst) {
            targetVelX *= nearMissBurst.speedMultiplier;
            targetVelY *= nearMissBurst.speedMultiplier;
          }
          if (desiredSpeed > 0 && riskProfile.instability > 0) {
            const jitterSeed = this.time.now * 0.006;
            const deviationAngle =
              (Math.sin(jitterSeed * 1.7 + 0.9) + Math.cos(jitterSeed * 2.6)) * 0.5 * riskProfile.movementDeviationMaxRad;
            const cos = Math.cos(deviationAngle);
            const sin = Math.sin(deviationAngle);
            const rotatedX = desiredDirX * cos - desiredDirY * sin;
            const rotatedY = desiredDirX * sin + desiredDirY * cos;
            desiredDirX = rotatedX;
            desiredDirY = rotatedY;
            const jitterX = Math.sin(jitterSeed * 3.4 + 1.1) * riskProfile.movementJitterSpeed;
            const jitterY = Math.cos(jitterSeed * 3.9 + 2.4) * riskProfile.movementJitterSpeed;
            targetVelX = desiredDirX * desiredSpeed + jitterX;
            targetVelY = desiredDirY * desiredSpeed + jitterY;
          }
          const currentSpeedTowardDesired =
            this.player.body.velocity.x * desiredDirX + this.player.body.velocity.y * desiredDirY;
          const isAcceleratingInput = desiredSpeed > 0 && currentSpeedTowardDesired < desiredSpeed;
          const inertiaK = isAcceleratingInput
            ? Math.min(0.999, this.state.inertia * this.state.accelerationBoost)
            : this.state.inertia;
          const t = Math.min(1, 1 - Math.pow(1 - inertiaK, dt / INERTIA_REF_MS));
          const vx = Phaser.Math.Linear(this.player.body.velocity.x, targetVelX, t);
          const vy = Phaser.Math.Linear(this.player.body.velocity.y, targetVelY, t);
          this.player.setVelocity(vx, vy);
          this.updateNearAttack(this.time.now);

          const nearMissPushback = this.state.nearMissPushback;
          const hasNearMissPushback = this.time.now < nearMissPushback.activeUntil;
          this.enemies.getChildren().forEach((enemy) => {
            const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, this.player.x, this.player.y);
            const pressuredSpeed = enemy.speed * riskProfile.enemyPressureMultiplier;
            let pushbackVx = 0;
            let pushbackVy = 0;
            if (hasNearMissPushback) {
              const fromPlayerX = enemy.x - this.player.x;
              const fromPlayerY = enemy.y - this.player.y;
              const dist = Math.hypot(fromPlayerX, fromPlayerY);
              if (dist > 0.001 && dist < nearMissPushback.radius) {
                const nx = fromPlayerX / dist;
                const ny = fromPlayerY / dist;
                const falloff = Phaser.Math.Clamp(1 - dist / nearMissPushback.radius, 0, 1);
                const pushSpeed = nearMissPushback.speed * falloff;
                pushbackVx = nx * pushSpeed;
                pushbackVy = ny * pushSpeed;
                if (pushSpeed > 16) {
                  const hitReadability = Phaser.Math.Clamp(pushSpeed / nearMissPushback.speed, 0.18, 1);
                  enemy.nearReactUntil = this.time.now + 90;
                  enemy.nearReactStrength = Phaser.Math.Clamp(hitReadability * 1.08, 0, 1);
                }
              }
            }
            if (enemy.behaviorType === ENEMY_BEHAVIOR_TYPES.DRIFTER) {
              const toPlayerX = Math.cos(angle);
              const toPlayerY = Math.sin(angle);
              const perpX = -toPlayerY;
              const perpY = toPlayerX;
              const driftOscillation = Math.sin(this.time.now * enemy.driftFrequency + enemy.driftPhase) * enemy.driftStrength;
              const targetX = toPlayerX + perpX * driftOscillation;
              const targetY = toPlayerY + perpY * driftOscillation;
              const targetLen = Math.hypot(targetX, targetY) || 1;
              enemy.setVelocity(
                (targetX / targetLen) * pressuredSpeed + pushbackVx,
                (targetY / targetLen) * pressuredSpeed + pushbackVy,
              );
              if (Math.random() < 0.045) {
                this.xpTrailParticles.emitParticleAt(enemy.x, enemy.y, 1);
              }
              return;
            }
            if (enemy.behaviorType === ENEMY_BEHAVIOR_TYPES.SWARM && Math.random() < 0.06) {
              this.xpTrailParticles.emitParticleAt(enemy.x, enemy.y, 1);
            }
            enemy.setVelocity(
              Math.cos(angle) * pressuredSpeed + pushbackVx,
              Math.sin(angle) * pressuredSpeed + pushbackVy,
            );
          });

          this.bullets.getChildren().forEach((bullet) => {
            bullet.lifespan -= dt;
            if (bullet.lifespan <= 0) bullet.disableBody(true, true);
          });

          const magnetConfig = this.getXpMagnetConfig();
          const nearMissPulse = this.state.nearMissMagnetPulse;
          const hasNearMissPulse =
            this.time.now < nearMissPulse.activeUntil &&
            this.time.now >= this.state.xpMagnetBurst.activeUntil;
          const effectiveMagnetConfig = hasNearMissPulse
            ? {
                radius: nearMissPulse.radius,
                maxSpeed: nearMissPulse.maxSpeed,
                lerp: nearMissPulse.lerp,
              }
            : magnetConfig;
          const nearXpVisualBoost = hasNearMissPulse ? 1.46 : 1;
          const magnetRadiusSq = effectiveMagnetConfig.radius * effectiveMagnetConfig.radius;
          let shouldEmitXpTrail = false;
          let xpTrailX = this.player.x;
          let xpTrailY = this.player.y;
          let xpTrailStrength = 0;
          let xpTrailVx = 0;
          let xpTrailVy = 0;
          this.xpOrbs.getChildren().forEach((orb) => {
            if (!orb.active) return;
            const dx = this.player.x - orb.x;
            const dy = this.player.y - orb.y;
            const distSq = dx * dx + dy * dy;
            const baseScale = orb.baseScale || VISUAL_SCALE.xp;
            const idlePulse = Math.sin(this.time.now * XP_VISUAL.pulseSpeed + (orb.idlePhase || 0));
            const idleBreathe = Math.cos(this.time.now * 0.0028 + (orb.driftPhase || 0));
            const idleScale = 1 + idlePulse * XP_VISUAL.pulseScale + idleBreathe * 0.02;
            let scaleX = baseScale * idleScale;
            let scaleY = baseScale * idleScale;
            let alpha = Phaser.Math.Clamp(0.72 + (idlePulse * 0.5 + 0.5) * XP_VISUAL.pulseAlpha, 0.58, 0.98);
            orb.setRotation(0);
            if (distSq > magnetRadiusSq) {
              orb.setVelocity(0, 0);
              orb.setScale(scaleX, scaleY);
              orb.setAlpha(alpha);
              return;
            }
            const dist = Math.max(1, Math.sqrt(distSq));
            const nx = dx / dist;
            const ny = dy / dist;
            const pullStrength = Phaser.Math.Clamp(1 - dist / effectiveMagnetConfig.radius, 0.16, 1);
            const targetVx = nx * effectiveMagnetConfig.maxSpeed * pullStrength;
            const targetVy = ny * effectiveMagnetConfig.maxSpeed * pullStrength;
            const nextVx = Phaser.Math.Linear(orb.body.velocity.x, targetVx, effectiveMagnetConfig.lerp);
            const nextVy = Phaser.Math.Linear(orb.body.velocity.y, targetVy, effectiveMagnetConfig.lerp);
            orb.setVelocity(nextVx, nextVy);
            const speed = Math.hypot(nextVx, nextVy);
            if (speed > XP_VISUAL.pullSpeedThreshold) {
              const pullFactor = Phaser.Math.Clamp((speed / effectiveMagnetConfig.maxSpeed) * nearXpVisualBoost, 0, 1);
              const stretch = 1 + pullFactor * XP_VISUAL.stretchMax;
              scaleX *= stretch;
              scaleY *= 2 - stretch;
              alpha = Phaser.Math.Clamp(alpha + pullFactor * XP_VISUAL.glowBoostMax, 0.6, 1);
              orb.setRotation(Math.atan2(nextVy, nextVx));
              if (speed > XP_VISUAL.trailSpeedThreshold) {
                const trailStrength = Phaser.Math.Clamp(
                  ((speed - XP_VISUAL.trailSpeedThreshold) / effectiveMagnetConfig.maxSpeed) * nearXpVisualBoost,
                  0,
                  1,
                );
                if (trailStrength >= xpTrailStrength) {
                  shouldEmitXpTrail = true;
                  xpTrailStrength = trailStrength;
                  xpTrailVx = nextVx;
                  xpTrailVy = nextVy;
                  const offset = Phaser.Math.Linear(XP_VISUAL.trailOffsetMin, XP_VISUAL.trailOffsetMax, trailStrength);
                  xpTrailX = orb.x - nx * offset;
                  xpTrailY = orb.y - ny * offset;
                }
              }
            }
            orb.setScale(scaleX, scaleY);
            orb.setAlpha(alpha);
          });
          if (
            shouldEmitXpTrail &&
            this.xpTrailParticles &&
            this.time.now - this.lastXpTrailAt >= Phaser.Math.Linear(
              XP_VISUAL.trailBaseIntervalMs,
              XP_VISUAL.trailPullIntervalMs,
              xpTrailStrength,
            ) * getActiveBuildTuning().xpAttraction.trailIntervalScale * (hasNearMissPulse ? 0.72 : 1)
          ) {
            this.lastXpTrailAt = this.time.now;
            const trailSpeed = Math.hypot(xpTrailVx, xpTrailVy) || 1;
            const dirX = xpTrailVx / trailSpeed;
            const dirY = xpTrailVy / trailSpeed;
            const trailMotion = Phaser.Math.Clamp(
              (trailSpeed - XP_VISUAL.trailStrongThreshold) /
              Math.max(1, effectiveMagnetConfig.maxSpeed - XP_VISUAL.trailStrongThreshold),
              0,
              1,
            );
            const dynamicTrailScale = Phaser.Math.Linear(XP_VISUAL.trailScaleMin, XP_VISUAL.trailScaleMax, trailMotion);
            const trailScaleOp = { start: dynamicTrailScale, end: 0.01 };
            this.xpTrailParticles.particleScaleX = trailScaleOp;
            this.xpTrailParticles.particleScaleY = trailScaleOp;
            this.xpTrailParticles.particleAlpha = {
              start: Phaser.Math.Clamp(
                Phaser.Math.Linear(XP_VISUAL.trailAlphaMin, XP_VISUAL.trailAlphaMax, trailMotion)
                * getActiveBuildTuning().xpAttraction.trailAlphaScale
                * (hasNearMissPulse ? 1.28 : 1),
                0,
                1,
              ),
              end: 0,
            };
            this.xpTrailParticles.setParticleLifespan(
              Phaser.Math.Linear(XP_VISUAL.trailLifespanMin, XP_VISUAL.trailLifespanMax, trailMotion),
            );
            this.xpTrailParticles.speed = {
              min: Phaser.Math.Linear(XP_VISUAL.trailSpeedMin, XP_VISUAL.trailSpeedMax * 0.55, trailMotion),
              max: Phaser.Math.Linear(XP_VISUAL.trailSpeedMin * 1.5, XP_VISUAL.trailSpeedMax, trailMotion),
            };
            this.xpTrailParticles.emitParticleAt(xpTrailX, xpTrailY, 1);
            if (xpTrailStrength > 0.28) {
              const tailParticles = Math.max(
                1,
                Math.round(
                  (1 + Math.round(trailMotion * 2) + (hasNearMissPulse ? 1 : 0))
                  * getActiveBuildTuning().xpAttraction.trailTailScale,
                ),
              );
              for (let i = 1; i <= tailParticles; i += 1) {
                const tailBack = Phaser.Math.Linear(XP_VISUAL.trailBackOffsetMin, XP_VISUAL.trailBackOffsetMax, i / (tailParticles + 0.35));
                this.xpTrailParticles.emitParticleAt(xpTrailX - dirX * tailBack, xpTrailY - dirY * tailBack, 1);
              }
            }
          }

          this.tryAccidentalSnap(dt, riskProfile);

          const instability = riskProfile.instability;
          const pulse = this.time.now * 0.012;
          const jitterPower = 1 + instability * 3.2;
          const jitterX = (Math.sin(pulse * 2.1) + Math.sin(pulse * 3.6 + 0.9)) * 0.5 * jitterPower;
          const jitterY = (Math.cos(pulse * 2.8 + 0.4) + Math.sin(pulse * 4.4 + 1.3)) * 0.5 * jitterPower;
          this.cameras.main.setScroll(jitterX, jitterY);
          this.cameras.main.setRotation((Math.sin(pulse * 1.4) * 0.0035 + Math.sin(pulse * 3.2) * 0.002) * instability);

          const flicker = 0.9 + 0.1 * Math.sin(pulse * 5.8 + Math.sin(pulse * 2.3));
          this.player.setAlpha(this.playerBaseAlpha * Phaser.Math.Linear(1, flicker, instability));
          this.player.setScale(this.playerBaseScale * (1 + Math.sin(pulse * 6.2 + 0.6) * instability * 0.03));
          if (this.playerHitRing) {
            this.playerHitRing.setPosition(this.player.x, this.player.y);
          }
          if (this.playerTrailParticles) {
            const playerTrailTuning = getActiveBuildTuning().playerTrail;
            const playerSpeed = this.player.body.velocity.length();
            const trailStrength = Phaser.Math.Clamp(
              (playerSpeed - PLAYER_TRAIL_VISUAL.minSpeed) /
              Math.max(1, PLAYER_TRAIL_VISUAL.fullSpeed - PLAYER_TRAIL_VISUAL.minSpeed),
              0,
              1,
            );
            const burstTrailStrength = hasNearMissBurst ? Phaser.Math.Clamp(trailStrength + 0.32, 0, 1) : trailStrength;
            this.playerTrailParticles.emitting = hasNearMissBurst || trailStrength > 0.04;
            this.playerTrailParticles.frequency = Phaser.Math.Linear(
              PLAYER_TRAIL_VISUAL.frequencySlow,
              PLAYER_TRAIL_VISUAL.frequencyFast,
              burstTrailStrength,
            ) * playerTrailTuning.frequencyScale * (hasNearMissBurst ? 0.74 : 1);
            this.playerTrailParticles.setParticleLifespan(
              Phaser.Math.Linear(
                PLAYER_TRAIL_VISUAL.lifespanSlow,
                PLAYER_TRAIL_VISUAL.lifespanFast,
                burstTrailStrength,
              ) * playerTrailTuning.lifespanScale * (hasNearMissBurst ? 1.2 : 1),
            );
            this.playerTrailParticles.particleScaleX = {
              start: Phaser.Math.Linear(PLAYER_TRAIL_VISUAL.scaleStartSlow, PLAYER_TRAIL_VISUAL.scaleStartFast, burstTrailStrength),
              end: Phaser.Math.Linear(PLAYER_TRAIL_VISUAL.scaleEndSlow, PLAYER_TRAIL_VISUAL.scaleEndFast, burstTrailStrength),
            };
            this.playerTrailParticles.particleScaleY = this.playerTrailParticles.particleScaleX;
            this.playerTrailParticles.particleAlpha = {
              start: Phaser.Math.Clamp(
                Phaser.Math.Linear(PLAYER_TRAIL_VISUAL.alphaSlow, PLAYER_TRAIL_VISUAL.alphaFast, burstTrailStrength)
                * playerTrailTuning.alphaScale
                * (hasNearMissBurst ? 1.34 : 1),
                0,
                1,
              ),
              end: 0,
            };
          }

          const enemyPulse = this.time.now * 0.0038;
          this.enemies.getChildren().forEach((enemy, enemyIndex) => {
            const seed = enemy.driftPhase || enemyIndex * 0.7;
            const nearReactProgress = enemy.nearReactUntil
              ? Phaser.Math.Clamp((enemy.nearReactUntil - this.time.now) / 90, 0, 1)
              : 0;
            const nearReactStrength = (enemy.nearReactStrength || 0) * nearReactProgress;
            const nearAttackHitProgress = enemy.nearAttackHitUntil
              ? Phaser.Math.Clamp(
                (enemy.nearAttackHitUntil - this.time.now) / NEAR_ATTACK_HIT_TUNING.debugHitFlashMs,
                0,
                1,
              )
              : 0;
            const nearAttackHitStrength = (enemy.nearAttackHitStrength || 0) * nearAttackHitProgress;
            if (enemy.behaviorType === ENEMY_BEHAVIOR_TYPES.SWARM) {
              const swarmJitter = Math.sin(enemyPulse * 6 + seed * 4.5);
              enemy.setAlpha(0.8 + swarmJitter * 0.1);
              enemy.setScale((VISUAL_SCALE.enemySwarm || VISUAL_SCALE.enemy) * (1 + swarmJitter * 0.03));
            } else if (enemy.behaviorType === ENEMY_BEHAVIOR_TYPES.DRIFTER) {
              const driftAura = 0.5 + 0.5 * Math.sin(enemyPulse * 2.6 + seed);
              enemy.setAlpha(0.78 + driftAura * 0.2);
              enemy.setScale(VISUAL_SCALE.enemy * (1.04 + driftAura * 0.06));
            } else {
              const chaserFlicker = 0.5 + 0.5 * Math.sin(enemyPulse * 4.3 + seed * 2);
              enemy.setAlpha(0.88 + chaserFlicker * 0.1);
              enemy.setScale(VISUAL_SCALE.enemy * (0.98 + chaserFlicker * 0.04));
            }
            if (nearAttackHitStrength > 0.01) {
              enemy.setTintFill(0xfff3ae, 0xfff3ae, 0xfff3ae, 0xfff3ae);
              enemy.setAlpha(Phaser.Math.Clamp(enemy.alpha + nearAttackHitStrength * 0.3, 0, 1));
              enemy.setScale(enemy.scaleX * (1 - nearAttackHitStrength * 0.13), enemy.scaleY * (1 - nearAttackHitStrength * 0.13));
            } else if (nearReactStrength > 0.01) {
              enemy.setTintFill(0xdce7ff, 0xdce7ff, 0xdce7ff, 0xdce7ff);
              enemy.setAlpha(Phaser.Math.Clamp(enemy.alpha + nearReactStrength * 0.24, 0, 1));
              enemy.setScale(enemy.scaleX * (1 - nearReactStrength * 0.09), enemy.scaleY * (1 - nearReactStrength * 0.09));
            } else {
              enemy.clearTint();
            }
          });

          if (this.instabilityParticles) {
            this.instabilityParticles.frequency = Phaser.Math.Linear(160, 34, instability);
            this.instabilityParticles.speed = {
              min: Phaser.Math.Linear(18, 44, instability),
              max: Phaser.Math.Linear(48, 120, instability),
            };
            const instS = Phaser.Math.Linear(0.16, 0.18, instability);
            this.instabilityParticles.setParticleScale(instS, instS);
            this.instabilityParticles.particleAlpha = Phaser.Math.Linear(0.28, 0.35, instability);
          }
        }
      }

      new Phaser.Game({
        type: Phaser.AUTO,
        parent: 'game-wrap',
        width: WORLD_W,
        height: WORLD_H,
        backgroundColor: '#11172a',
        physics: {
          default: 'arcade',
          arcade: { debug: false },
        },
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH,
          width: WORLD_W,
          height: WORLD_H,
        },
        scene: [GameScene],
      });
    })();
  </script>
</body>
</html>
